<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NICAR 2026 Schedule Grid</title>
<meta name="description" content="Browse and explore the full schedule grid for NICAR 2026 conference sessions and events." />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #111; }

  .header { padding: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }
  .header h1 { font-size: 1.75rem; font-weight: 700; }
  .day-tabs { display: flex; gap: 8px; }
  .day-tab {
    padding: 6px 14px; border-radius: 9999px; font-size: 0.85rem; font-weight: 500;
    border: 1px solid #d1d5db; background: #fff; color: #6b7280; cursor: pointer;
    transition: all 0.15s;
  }
  .day-tab:hover { border-color: #6b7280; color: #111; }
  .day-tab.active { background: #111; color: #fff; border-color: #111; }

  .controls { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .search-box {
    padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem;
    width: 240px; outline: none;
  }
  .search-box:focus { border-color: #111; }
  .filter-select {
    padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem;
    background: #fff; cursor: pointer; outline: none;
  }
  .highlight-count { font-size: 0.8rem; color: #92400e; background: #fef3c7; padding: 4px 10px; border-radius: 6px; }
  .btn-small {
    font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; cursor: pointer;
    background: none; border: 1px solid;
  }
  .btn-small:hover { opacity: 0.8; }
  .btn-show-hl { color: #92400e; border-color: #d97706; }
  .btn-show-hl:hover, .btn-show-hl.active { background: #fef3c7; }
  .btn-clear { color: #92400e; border-color: #92400e; }
  .btn-clear:hover { background: #fef3c7; }
  .btn-share { color: #047857; border-color: #047857; }
  .btn-share:hover { background: #ecfdf5; }
  .btn-export { color: #1e40af; border-color: #1e40af; margin-left: auto; }
  .btn-export:hover { background: #eff6ff; }

  .grid-wrap { overflow-x: auto; padding: 0 16px 16px; }
  .schedule-grid { display: grid; position: relative; }

  .room-header {
    font-size: 0.7rem; font-weight: 600; text-align: center; padding: 4px 2px;
    background: #f9fafb; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .time-label {
    font-size: 0.65rem; color: #6b7280; padding: 2px 4px; text-align: right;
    border-right: 1px solid #e5e7eb; background: #fff;
    position: sticky; left: 0; z-index: 20;
    white-space: nowrap;
  }
  .corner {
    position: sticky; left: 0; z-index: 30; background: #fff;
    border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb;
  }

  /* Session card — matches original Tyler Machado styling */
  .session-card {
    border: 1px solid #d1d5db; background: #f9fafb; border-radius: 4px;
    font-size: 11px; line-height: 1.15; padding: 4px; margin: 1px;
    overflow: hidden; cursor: pointer;
    text-align: left; display: flex; flex-direction: column; align-items: flex-start;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .session-card:hover { background: #f3f4f6; }
  .session-card.highlighted {
    background: #fef9c3 !important; border-color: #ca8a04 !important;
    box-shadow: inset 0 0 0 1px #ca8a04;
  }
  .session-card .title { font-weight: 600; display: block; }
  .session-card .speakers-line {
    font-weight: 400; color: #6b7280; display: block; margin-top: 1px;
    font-size: 9.5px; line-height: 1.2;
  }
  .session-card.hidden-by-filter { display: none; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 100; justify-content: center; align-items: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 600px; width: 100%;
    max-height: 80vh; overflow-y: auto; padding: 24px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    font-size: 1.5rem; cursor: pointer; color: #6b7280; line-height: 1;
  }
  .modal-close:hover { color: #111; }
  .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; padding-right: 32px; }
  .modal .meta { font-size: 0.85rem; color: #6b7280; margin-bottom: 12px; }
  .modal .meta span { margin-right: 12px; }
  .modal .description { font-size: 0.9rem; line-height: 1.6; color: #374151; margin-bottom: 16px; }
  .modal .type-badge {
    font-size: 0.7rem; color: #fff; border-radius: 3px; padding: 1px 6px;
    display: inline-block; line-height: 1.5;
  }
  .type-demo { background: #2563eb; }
  .type-panel { background: #7c3aed; }
  .type-hands-on { background: #059669; }
  .type-master-class { background: #dc2626; }
  .type-nicar-conversation { background: #d97706; }
  .type-networking { background: #0891b2; }
  .type-special { background: #be185d; }
  .type-one-on-one { background: #4b5563; }
  .type-other { background: #6b7280; }

  .modal .speaker-list { margin-bottom: 12px; }
  .modal .speaker-card {
    display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3f4f6;
  }
  .modal .speaker-card:last-child { border-bottom: none; }
  .modal .speaker-headshot {
    width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
    flex-shrink: 0; background: #e5e7eb;
  }
  .modal .speaker-info { flex: 1; min-width: 0; }
  .modal .speaker-name { font-weight: 600; font-size: 0.9rem; }
  .modal .speaker-org { color: #6b7280; font-size: 0.85rem; }
  .modal .speaker-bio { font-size: 0.8rem; color: #4b5563; margin-top: 4px; line-height: 1.5; }
  .modal .speaker-expertise { font-size: 0.75rem; color: #059669; margin-top: 3px; font-style: italic; }
  .modal .speaker-social { margin-top: 3px; }
  .modal .speaker-social a {
    font-size: 0.75rem; color: #2563eb; text-decoration: none; margin-right: 8px;
  }
  .modal .speaker-social a:hover { text-decoration: underline; }
  .modal .tracks { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .modal .track-tag {
    font-size: 0.75rem; background: #f3f4f6; border: 1px solid #e5e7eb;
    border-radius: 4px; padding: 2px 8px; color: #374151;
  }
  .modal .btn-highlight {
    padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; border: 2px solid #ca8a04; background: #fff; color: #92400e;
    transition: all 0.15s;
  }
  .modal .btn-highlight:hover, .modal .btn-highlight.is-highlighted { background: #fef9c3; }

  .save-toast {
    position: fixed; bottom: 24px; right: 24px; background: #065f46; color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
    opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 200;
    pointer-events: none;
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  .credit { padding: 16px; font-size: 0.75rem; color: #9ca3af; text-align: center; }
  .credit a { color: #6b7280; }
</style>
</head>
<body>

<div class="header">
  <h1>NICAR 2026</h1>
  <div class="day-tabs" id="dayTabs"></div>
  <input type="text" class="search-box" id="searchBox" placeholder="Search sessions or speakers..." />
  <select class="filter-select" id="typeFilter"><option value="">All types</option></select>
  <select class="filter-select" id="trackFilter"><option value="">All tracks</option></select>
  <div class="credit" style="margin-left:auto;padding:0">Schedule grid concept and design by <a href="https://www.tylermachado.com/nicar-schedule/" target="_blank">Tyler Machado</a>. Data from <a href="https://schedules.ire.org" target="_blank">IRE/NICAR</a>.</div>
</div>
<div class="controls" id="controls">
  <span class="highlight-count" id="highlightCount" style="display:none"></span>
  <button class="btn-small btn-show-hl" id="btnShowHl" style="display:none" onclick="toggleShowHighlighted()">Show only highlighted</button>
  <button class="btn-small btn-clear" id="btnClearHighlights" style="display:none" onclick="clearHighlights()">Clear all</button>
  <button class="btn-small btn-share" id="btnShare" style="display:none" onclick="shareHighlights()">Copy share link</button>
  <button class="btn-small btn-export" id="btnExport" style="display:none" onclick="exportHighlights()">Export as text</button>
</div>
<div class="grid-wrap">
  <div class="schedule-grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<div class="save-toast" id="saveToast">Saved!</div>


<script id="speakerData" type="application/json">{"Harriet Agerholm":{"affiliation":"BBC News","bio":"","headshot":"","social":[],"expertise":""},"Catherine Allen":{"affiliation":"POLITICO","bio":"","headshot":"","social":[],"expertise":""},"Alejandra Arevalo Zuniga":{"affiliation":"Google","bio":"Alejandra Arevalo is a data analyst at Google Trends. Previously, as a developer fellow at Hearst Newspapers, she built data, AI and visual storytelling products for local newsrooms across the U.S. She also worked at analytics company Chartmetric, exploring music industry trends through data. An active member of the data visualization community, Alejandra's work has been featured in Nightingale, the journal of the Data Visualization Society.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/alejandrarevalo/"}],"expertise":""},"Peyton Barish":{"affiliation":"Knight-Newhouse College Athletics Database","bio":"Peyton Barish is the assistant project manager for the Knight-Newhouse College Athletics Database and a former Division I athlete at NC State University. He has a background in college athletics policy with a particular interest in labor policy and innovative sport solutions.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/peyton-barish/"}],"expertise":""},"Rob Barry":{"affiliation":"The Wall Street Journal","bio":"","headshot":"","social":[],"expertise":""},"Leah Becerra":{"affiliation":"Reynolds Journalism Institute","bio":"Leah Becerra is the News Media Help Desk Product Director at Reynolds Journalism Institute. She has more than a decade of experience working in local newsrooms across the Midwest and East Coast. She also teaches the Missouri School of Journalism's web design class, where students learn HTML, CSS \u2014 a little javascript \u2014 and how to use product thinking strategies to build intentional digital experiences for audiences.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/becerra-leah.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/leahbecerra/"},{"label":"Bluesky","url":"https://bsky.app/profile/leahbecerra.com"}],"expertise":""},"Ariana Beedie":{"affiliation":"Mirror Indy","bio":"","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/beedie-ariana.jpg","social":[],"expertise":""},"Helena Bengtsson":{"affiliation":"Gota Media / Bonnier News Local","bio":"Helena Bengtsson is currently the data journalism editor at Gota Media and Bonnier News Local. She previously held data journalism leadership roles at Sveriges Television and The Guardian UK, and was a database editor at the Center for Public Integrity. She has been awarded The Swedish Grand Prize for Journalism twice.","headshot":"","social":[],"expertise":"data journalism; computer-assisted reporting (CAR); investigative reporting; database analysis and cleaning; freedom of information requests; unstructured data"},"Rahul Bhargava":{"affiliation":"Northeastern University","bio":"Rahul Bhargava (he/him/his) is a researcher, educator, designer, and artist working on creative data storytelling and computational journalism. He creates data murals and theatre with communities, award-winning museum exhibits, AI-powered civic technologies with CSOs, and delivers hands-on workshops and keynote talks across the globe. Rahul\u2019s first book, \u201cCommunity Data: Creative Approaches to Empowering People with Information\u201d, is now available.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/rahulbot.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/rahulbot/"}],"expertise":""},"Rae Ellen Bichell":{"affiliation":"KFF Health News","bio":"Rae Ellen Bichell is a correspondent with KFF Health News and is based in Colorado. Her recent data work has focused on medical debt, federal grant cuts, Medicaid enrollment and doctor shortages. She used to be an on-air science journalist with NPR and a regional reporter with the Mountain West News Bureau. One time, she started a radio show in Helsinki.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/raelnb.bsky.social"},{"label":"X","url":"https://x.com/raelnb"}],"expertise":"science journalism; health journalism; radio reporting; data journalism"},"Jill Blackman":{"affiliation":"Northwestern University","bio":"","headshot":"","social":[],"expertise":""},"Jessie Blaeser":{"affiliation":"POLITICO","bio":"Jessie Blaeser is a senior data enterprise reporter for Politico. She holds a master's in data journalism from Columbia University and is a graduate of the University of Georgia.","headshot":"","social":[],"expertise":"data enterprise reporting; federal spending records; data journalism"},"Alexander Borodikhin":{"affiliation":"Mediazona","bio":"Alexander Borodikhin is a reporter and editor at Mediazona, an independent Russian outlet covering political repression and the war in Ukraine. He heads the English-language site and reports for the data team. Mediazona, in collaboration with the BBC and a team of volunteers, has built a database of 200,000 verified Russian military casualties, data the Kremlin seeks to hide. The team has also scraped Russian courts\u2019 websites to create a full searchable database.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/borodikhin-alexander.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/borodikhin/"}],"expertise":""},"Declan Bradley":{"affiliation":"Oberlin College","bio":"Declan Bradley is a senior at Oberlin College. As a 2025 Dow Jones News Fund intern in data reporting, he developed investigative stories for the Howard Center for Investigative Journalism at the University of Maryland. He is a graduate of the Lede Program for Data Journalism at Columbia University and former intern for The Chronicle of Higher Education. In 2024, he was named Reporter of the Year by the Associated Collegiate Press.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/declanrjb"},{"label":"Bluesky","url":"https://bsky.app/profile/declanrjb.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/declan-bradley-1a7685285/"}],"expertise":"data reporting; data visualization; investigative journalism; elections data; corporate finance"},"Luke Britt":{"affiliation":"Marion County Superior Courts","bio":"","headshot":"","social":[],"expertise":""},"Andrew Briz":{"affiliation":"POLITICO","bio":"","headshot":"","social":[],"expertise":""},"AmyJo Brown":{"affiliation":"The Public Ledger","bio":"AmyJo Brown is a veteran journalist with a background in local government and investigative reporting. As a consulting editor, she focuses on the organizational challenges specific to doing good journalism at the local level. She designed The Public Ledger \u2014 a strategy rooted in beat expertise and hard-won knowledge of newsroom economics \u2014 to transform public records into research infrastructure, helping newsrooms track money, map power & surface story leads faster.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/amyjobr/"}],"expertise":""},"Jennifer Burns":{"affiliation":"Bright Data","bio":"","headshot":"","social":[],"expertise":""},"A\u00efcha Camara":{"affiliation":"McClatchy","bio":"A\u00efcha Camara is a Master of Science in Computational Analysis and Public Policy (MSCAPP) student at the University of Chicago, Harris School of Public Policy (Class of 2024). She served as a data science intern for the Invisible Institute, focusing on projects investigating gender-based violence.","headshot":"","social":[],"expertise":"data science; public policy; data analysis; civic technology; gender-based violence investigations"},"Silvia Canel\u00f3n":{"affiliation":"Independent journalist","bio":"Silvia Canel\u00f3n (she/her/ella) is a data journalist, R educator and researcher with a love for Philly and a passion for data literacy. She values creative ways of using data to connect individual stories to broader patterns that impact entire communities. Silvia would love to meet other data journalists, so please say hello! Lately, her favorite topics of conversation include open source tools, AI skepticism, psychological thrillers and pottery.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/canelon-silvia.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/silviacanelon.com"},{"label":"LinkedIn","url":"https://linkedin.com/in/spcanelon"},{"label":"Mastodon","url":"https://hachyderm.io/@spcanelon"},{"label":"GitHub","url":"https://github.com/spcanelon"}],"expertise":""},"Emma Carew Grovum":{"affiliation":"Kimbap Media","bio":"Emma Carew Grovum is the founder of Kimbap Media, working at the intersection of journalism, technology and audience. She holds a Cornell University certificate in Building a Diverse Workforce, completed leadership programs at Yale and Poynter, and participated in CUNY\u2019s 2025 AI Lab for Leaders. Emma has previously worked at The Marshall Project, The Daily Beast, The New York Times, Foreign Policy, The Chronicle of Philanthropy and The Star Tribune.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/carewgrovum-emma.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/emmacarewgrovum/"}],"expertise":"Journalism leadership; Product thinking in journalism; Digital transformation; Anti-racism interventions in newsrooms; Audience engagement"},"Matt Carroll":{"affiliation":"Northeastern University","bio":"Matt Carroll is a journalism professor at Northeastern University. He worked for 26 years at the Boston Globe, specializing in data storytelling. He was a member of the Spotlight team, the newsroom\u2019s investigative unit, when it won the Pulitzer Prize for Public Service in 2003 for its coverage of the Catholic priest sexual abuse scandal. That story was turned into the movie \u201cSpotlight,\u201d which won the Oscar for Best Picture.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/carroll-matt.jpg","social":[],"expertise":""},"Zak Cassel":{"affiliation":"WFYI","bio":"","headshot":"","social":[],"expertise":""},"Jill Castellano":{"affiliation":"The Marshall Project","bio":"Jill Castellano is a data journalist for The Marshall Project. She has worked for ABC Television, inewsource, The Desert Sun and The Salt Lake Tribune. Along with her colleagues, she was awarded the Pulitzer Prize for explanatory reporting in 2018 for her work with USA Today on the deaths of undocumented border crossers.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/castellano-jill.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/jillcastellano.bsky.social"}],"expertise":""},"Ezana \u0106eman":{"affiliation":"Organized Crime and Corruption Reporting Project","bio":"Ezana \u0106eman is the Product Manager for data platforms at OCCRP, where she oversees the development of tools like OCCRP Aleph Pro. Since 2021, she has focused on user-centered innovation to support the organization\u2019s strategic goals. Ezana holds a master\u2019s in IT and is a Grace Hopper and two-time Forbes 30 Under 30 Scholar. Additionally, she leads digital education and advocacy at FemLab, an NGO advancing gender equality in Bosnia and Herzegovina.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/ceman-ezana.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/ezanac.occrp.org"},{"label":"X","url":"https://x.com/ezana_c"},{"label":"LinkedIn","url":"http://www.linkedin.com/in/ezanac"}],"expertise":""},"Aishi Chandra":{"affiliation":"Columbia University","bio":"","headshot":"","social":[],"expertise":""},"Aisvarya  Chandrasekar":{"affiliation":"Tow Center at Columbia University","bio":"Aisvarya is a computational journalist at the Tow Center for Digital Journalism, where she studies the uses and impact of AI tools in journalism.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/aisvarya17.bsky.social"}],"expertise":""},"Cate Charron":{"affiliation":"Indy Star","bio":"","headshot":"","social":[],"expertise":""},"Lakeidra Chavis":{"affiliation":"The Marshall Project","bio":"","headshot":"","social":[],"expertise":""},"Sophie Chou":{"affiliation":"Independent journalist","bio":"","headshot":"","social":[],"expertise":""},"Carl Churchill":{"affiliation":"The Wall Street Journal","bio":"Carl Churchill is a graphics reporter with The Wall Street Journal. He works primarily on issues relating to climate, ecology and U.S. news. He joined the Journal after working for Woodwell Climate Research Center, a climate science organization based in Massachusetts. While there, he received recognition for his graphics work on Amazon deforestation and Arctic climate change. He has a master's in GIS from Arizona State University.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/carl-churchill/"}],"expertise":""},"Laine Cibulskis":{"affiliation":"University of Missouri","bio":"Laine Cibulskis is a senior at the University of Missouri studying journalism and economics. In addition to reporting for the Columbia Missourian, Laine assists investigative journalists working on books through the Watchdog Writers Group. She has previously covered international trade in Brussels, personal finance in Washington, D.C. and business in Missouri.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/cibulskis-laine.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/laine-cibulskis/"}],"expertise":""},"Rosie Cima":{"affiliation":"Big Local News","bio":"","headshot":"","social":[],"expertise":""},"Chris Cioffi":{"affiliation":"Bloomberg","bio":"Chris Cioffi is a senior congressional reporter at Bloomberg Tax and an adjunct instructor at the University of Maryland, specializing in data journalism. He holds a master's degree in data journalism from the University of Maryland.","headshot":"","social":[],"expertise":"data journalism; congressional reporting; tax policy analysis; campaign finance analysis"},"Eva Constantaras":{"affiliation":"Lighthouse Reports","bio":"Eva Constantaras is a data journalist, editor for Lighthouse Reports, and trainer specializing in building collaborative investigative data journalism teams in Global Majority countries. She is a Google Data Journalism Scholar and Fulbright Fellow, recognized with a Sigma Data Journalism and Philip Meyer Award.","headshot":"","social":[],"expertise":"data journalism; investigative reporting; training data journalism teams; cross-border reporting"},"Monica Cordero":{"affiliation":"Investigate Midwest","bio":"M\u00f3nica Cordero is an Ortega y Gasset Award-winning investigative journalist and recipient of the 2026 A-Mark Prize for Investigative Reporting. She reports on agriculture, global trade and environmental policy for Investigative Midwest and the Mississippi River Basin Ag & Water Desk, blending collaborative investigations with data-driven analysis. Her work has appeared in The New York Times, openDemocracy, Univision and Radio Ambulante.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/cordero-monica.jpeg","social":[],"expertise":""},"Ethan Corey":{"affiliation":"Behind Bars Data Project","bio":"Ethan Corey is the Research & Projects Editor at The Appeal, where he focuses on investigative research and data-driven journalism, primarily within the criminal justice system. His work has been published in multiple outlets including In These Times, The Nation, and BuzzFeed News.","headshot":"","social":[],"expertise":"investigative journalism; data-driven journalism; criminal justice system; data analysis"},"Andrew Couts":{"affiliation":"WIRED","bio":"Andrew Couts is Senior Editor, Security & Investigations at WIRED, overseeing cybersecurity, privacy, policy, national security, and surveillance coverage. He also oversees investigations across WIRED's newsroom.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/couts.bsky.social"}],"expertise":""},"Will Craft":{"affiliation":"The Guardian","bio":"Will Craft is a data editor at the Guardian. ","headshot":"","social":[],"expertise":""},"David Cuillier":{"affiliation":"Brechner FOI Project","bio":"David Cuillier is director of the Brechner Freedom of Information Project at the University of Florida College of Journalism and Communications. He is a former journalist and taught journalism at the University of Arizona for 17 years. He is former president of the Society of Professional Journalists and the National Freedom of Information Coalition and co-author of \"The Art of Access: Strategies for Acquiring Public Records.\"","headshot":"","social":[],"expertise":"Freedom of Information (FOI); Access to public records; Data journalism; Media law and ethics; Investigative reporting"},"Kris Cundiff":{"affiliation":"Reporters Committee for Freedom of the Press (RCFP)","bio":"","headshot":"","social":[],"expertise":""},"Jovi Dai":{"affiliation":"National Association of REALTORS\u00ae","bio":"Jovi Dai is an interactive visualization developer at the National Association of REALTORS\u00ae, where he develops charts and other visualizations that turn complex data into clear, accessible information for readers. Before joining NAR, he was a data reporter for Bay Area News Group, producing data-driven and visual stories for the San Jose Mercury News and East Bay Times focused on the San Francisco Bay Area and issues affecting local communities.","headshot":"","social":[{"label":"X","url":"https://twitter.com/jovi_dai"},{"label":"Bluesky","url":"https://bsky.app/profile/jovidai.bsky.social"}],"expertise":"data-driven investigations; data visualization; data analysis; reusable dataviz with JavaScript; climate reporting tools"},"Becky Dale":{"affiliation":"BBC News e was a consumer investigative reporter at WSMV-TV in Nashville, TN. She has prior reporting experience at WWL-TV in New Orleans, WJRT in Flint, Michigan, and at WCBI in Columbus, Mississippi. She started her career behind the scenes as a producer at WJTV in Jackson, Mississippi.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/jackman-caresse.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/caresse-jackman-4396825/"},{"label":"Facebook","url":"https://www.facebook.com/caressejackmanWSMV/"},{"label":"Bluesky","url":"https://bsky.app/profile/caressejbskysocial.bsky.social"}],"expertise":"investigative reporting; consumer journalism; extracting data; public records; diversity in journalism"},"Allan James Vestal":{"affiliation":"The Baltimore Banner","bio":"Allan James Vestal is a Senior Editor on the graphics team at Bloomberg, where he leads data visualization coverage of U.S. elections. Previously, he was a senior news applications developer and election projects editor at Politico, and held roles as a computational journalist and news applications developer at other major news organizations.","headshot":"","social":[],"expertise":"data visualization; news applications development; election projects; computational journalism"},"Sahana Jayaraman":{"affiliation":"The Baltimore Banner","bio":"Sahana Jayaraman is an award-winning data reporter at The Banner. She is responsible for both analyses that provide context to quick-turn stories and those that build the backbone of enterprise and investigative projects. Previously, she worked at The Arizona Republic and The Washington Post. She primarily works in R and Python.","headshot":"","social":[],"expertise":"data collection and analysis; data visualization; investigative journalism; R and Python programming; web scraping; geospatial analysis"},"Jaclyn Jeffrey-Wilensky":{"affiliation":"The Wall Street Journal","bio":"Jaclyn Jeffrey-Wilensky is a data reporter for The Wall Street Journal. Before coming to The Journal, Jaclyn reported data-driven web and radio stories for WNYC/Gothamist, where her work on gun violence and COVID-19 won awards from the New York Press Club and the Deadline Club of New York. Jaclyn is an alumna of Cornell University and of the Newmark Graduate School of Journalism at CUNY, where she now teaches data journalism classes.","headshot":"","social":[{"label":"X","url":"https://x.com/jeffwilen"},{"label":"Bluesky","url":"https://bsky.app/profile/jjw.bsky.social"}],"expertise":""},"Brent Jones":{"affiliation":"NPR","bio":"Brent has spent his career in nonprofit news, starting as a member of the founding cohort of the St. Louis Beacon in 2008, joining St. Louis Public Radio in 2013 and most recently joining the editorial graphics team at NPR in 2023. He enjoys building tools and automations to help the team and wider newsroom. Outside work, Brent enjoys photography, singing and doing the daily New York Times crossword puzzle. He's based in the metro St. Louis area.","headshot":"","social":[],"expertise":""},"Allie Kanik":{"affiliation":"Houston Chronicle","bio":"Allie Kanik is data editor for the Houston Chronicle. She is a player coach, specializing in data visualization, mapping and Python analysis. Allie previously worked as a data reporter at Louisville Public Media in Kentucky and PublicSource in Pittsburgh.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/akanik"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/alexandra-kanik-918a891b/"}],"expertise":"data visualization; interactive graphics; data analysis; web scraping; FOIA requests; mapping for journalism"},"Adiel Kaplan":{"affiliation":"Tow-Knight Center for Journalism Futures","bio":"Adiel Kaplan is the program director for the Tow-Knight Center for Journalism Futures, where she focuses on how journalism can respond to and thrive as artificial intelligence disrupts news production, dissemination and consumption. She has worked as an investigative reporter and editor at local and national news outlets, including NBC News and the Miami Herald, and teaches investigative reporting for the investigative and data programs at Columbia Journalism School.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/kaplan-adiel.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/adiel-kaplan/"},{"label":"GitHub","url":"https://github.com/adiel-kaplan"}],"expertise":"investigative reporting; data journalism; editing; journalism education; oral history of journalism"},"Angeliki Kastanis":{"affiliation":"Associated Press","bio":"Angeliki Kastanis is the data editor at The Associated Press, leading a team of data reporters whose work has earned national awards for investigative reporting and influenced policy. She holds a Master of Public Policy from The University of Chicago and previously worked as a data analyst at the Williams Institute-UCLA School of Law.","headshot":"","social":[],"expertise":"Data journalism; Investigative reporting; Census data analysis; Demographics and geographies; Data visualization; Exposing inequities"},"Jon Keegan":{"affiliation":"Sherwood News","bio":"Keegan is a data reporter covering AI and tech for Sherwood News. Previously, he was at The Markup and The Wall Street Journal.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/keegan-jon.png","social":[{"label":"Bluesky","url":"https://bsky.app/profile/jonkeegan.com"}],"expertise":""},"Claire Keenan-Kurgan":{"affiliation":"Interlochen Public Radio","bio":"Claire Keenan-Kurgan is a reporter for Interlochen Public Radio, where she covers general assignment news with a focus on labor, growth and the economy of northern Michigan. Before arriving at IPR, she interned for WBEZ\u2019s data journalism team in Chicago and for the investigative unit of American Public Media.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/claire-kurgan/"}],"expertise":""},"Emily Kennedy":{"affiliation":"Centre for Anthropology and Journalism","bio":"Emily is the founding director of the Centre for Anthropology and Journalism. Previously she was a senior editor and magazine editor-in-chief. She is a trained anthropologist (University of Victoria) and holds a Masters in Journalism from Carleton University, where she has also worked as an instructor.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/kennedy-emily.png","social":[{"label":"X","url":"https://twitter.com/Kennedy_Writes"}],"expertise":""},"Stacy Kess":{"affiliation":"Equal Access Public Media","bio":"Stacy Kess is the founder and chief of editorial of Equal Access Public Media (EAPM). She is a reporter and editor with more than 25 years\u2019 experience and has contended with life-long health issues. She is also a survivor of a head-on car-crash in 2017. She credits this as the beginning of EAPM. Kess said this led her to her mission of decreasing the accessibility barriers in the news. Kess oversees editorial and media at EAPM. She currently lives in Boston, Massachusetts.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/kess-stacy.png","social":[{"label":"Bluesky","url":"https://bsky.app/profile/stacykess.bsky.social"}],"expertise":"Accessible journalism; Disability inclusion in media; Web and digital accessibility; News language accessibility"},"Aaron Kessler":{"affiliation":"Associated Press","bio":"Aaron Kessler is an award-winning data and investigative journalist with nearly 20 years of experience, currently at The Associated Press. He specializes in data analysis and investigative reporting at the intersection of business and politics.","headshot":"","social":[],"expertise":"investigative reporting; data analysis; business and political journalism; data journalism instruction; newsroom innovation"},"Sam Kessler":{"affiliation":"The Wall Street Journal","bio":"Sam Kessler is a reporter for The Wall Street Journal based in New York City. He focuses on the intersection of power, business and technology, using data analysis and programming alongside traditional reporting to uncover investigative stories. Previously, Sam covered the crypto industry as deputy managing editor at CoinDesk, where he was part of a team that won a 2023 Gerald Loeb Award for its coverage of Sam Bankman-Fried and FTX.","headshot":"","social":[{"label":"X","url":"https://x.com/skesslr"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/sam-kessler-746089b0/"}],"expertise":""},"Maheen Khan":{"affiliation":"Invisible Institute","bio":"Maheen Khan is the director of technology at the Invisible Institute. She studied information analysis and computer science in undergrad, and now works to maintain the Invisible Institute's tech tools (like CPDP) and support with data analysis for investigations.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/khan-maheen.jpg","social":[],"expertise":"civic police data; technology in journalism; data analysis; information analysis"},"Alison Killing":{"affiliation":"Financial Times","bio":"","headshot":"","social":[],"expertise":""},"Scott Klein":{"affiliation":"","bio":"","headshot":"","social":[],"expertise":""},"Haohsiang Ko":{"affiliation":"Financial Times","bio":"Haohsiang is a data journalist on the FT\u2019s visual and data journalism team based in Hong Kong, covering Asia news stories through data analysis and graphics. Before joining the FT, he led the data journalism team at The Reporter in Taiwan, collaborating with journalists on investigative and in-depth stories.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/ko-haohsiang.png","social":[{"label":"X","url":"https://x.com/haohsiang0509"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/haohsiang0509/"}],"expertise":""},"Jared Kofsky":{"affiliation":"ABC News","bio":"Jared Kofsky produces investigative and breaking news stories for ABC News platforms, including Good Morning America, World News Tonight with David Muir, ABC News Live, This Week with George Stephanopoulos, Nightline and ABCNews.com, working from both the field and the network\u2019s headquarters in New York City. He is also an on-air contributor for ABC News Radio. Jared previously covered news in South Carolina and New Jersey.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/kofsky-jared.jpg","social":[{"label":"X","url":"https://x.com/JaredKofsky"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/jaredkofsky"}],"expertise":"investigative reporting; air traffic control reporting"},"Karina Kumar":{"affiliation":"Austin American-Statesman","bio":"Karina Kumar is a data reporter at the Austin American-Statesman. Most recently, she has used data and records to report on local government and compensation with a focus on accountability. She enjoys finding ways to make data accessible and easy to digest for readers.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/karina-kumar"}],"expertise":""},"Laura Kurtzberg":{"affiliation":"Investigative Reporters & Editors","bio":"","headshot":"","social":[],"expertise":""},"Jennifer LaFleur":{"affiliation":"UC Berkeley School of Journalism","bio":"Jennifer LaFleur is an Assistant Professor of Data Journalism at UC Berkeley Graduate School of Journalism and a former director of data journalism at ProPublica. She has extensive experience in investigative reporting and has served as a training director and board member for Investigative Reporters & Editors (IRE).","headshot":"","social":[],"expertise":"Data journalism education; Investigative reporting; Computer-assisted reporting; Social science methods in journalism; Uncovering inequality with data"},"Will Lager":{"affiliation":"Independent journalist","bio":"","headshot":"","social":[],"expertise":""},"A.J. Lagoe":{"affiliation":"KARE-TV","bio":"A.J. Lagoe is an investigative reporter for KARE-TV in Minneapolis. His reporting routinely leads to criminal convictions, legislative hearings, and new state and federal laws. A.J. is a multi-time recipient of journalism\u2019s highest honors including Peabody, Polk, duPont Columbia and IRE awards.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/lagoe-aj.png","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/a-j-lagoe"},{"label":"X","url":"https://x.com/AJInvestigates"},{"label":"Instagram","url":"https://www.instagram.com/ajlagoe/"}],"expertise":""},"Stephanie Lamm":{"affiliation":"Atlanta Journal-Constitution","bio":"Stephanie Lamm is a data reporter at the Atlanta Journal-Constitution who uses public records, data analysis and shoe-leather reporting to hold institutions accountable and uncover information that would otherwise remain hidden. She graduated from the University of North Carolina at Chapel Hill and spent five years working in Texas before landing in Atlanta.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/lamm-stephanie.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/stephanierlamm/"}],"expertise":"data analysis; investigative journalism; public records; news apps; public safety; corporate accountability; public health"},"Gerry Lanosga":{"affiliation":"Indiana University","bio":"","headshot":"","social":[],"expertise":""},"Allan Lasser":{"affiliation":"MuckRock","bio":"Allan Lasser has over a decade of experience in digital publishing and software design. As MuckRock's head of product, he works across departments to provide design direction, manage product roadmaps, listen to user feedback and identify new opportunities to help journalists do their best work.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/lasser-allan.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/allanlasser.com"},{"label":"GitHub","url":"https://github.com/allanlasser"}],"expertise":"UX design; Front-end development; Information design; Web application development"},"Tristan Lee":{"affiliation":"Decoherence Media","bio":"Tristan Lee is a data scientist and journalist specializing in investigating far-right networks using open-source methods. He co-founded Decoherence Media and was a data scientist at Bellingcat, winning the Al Neuharth Innovation in Investigative Journalism Award in 2025.","headshot":"","social":[],"expertise":"open-source intelligence (OSINT); investigating far-right networks; data science for journalism; social network analysis; computational physics"},"Julie Lee":{"affiliation":"Columbia University","bio":"","headshot":"","social":[],"expertise":""},"Michael H. LeRoy":{"affiliation":"University of Illinois","bio":"","headshot":"","social":[],"expertise":""},"Koby Levin":{"affiliation":"Outlier Media","bio":"Koby Levin is a senior reporter for Outlier Media. He lives in Detroit.","headshot":"","social":[{"label":"Instagram","url":"https://www.instagram.com/koby.det"}],"expertise":""},"George LeVines":{"affiliation":"The Trace","bio":"George LeVines is the editor of the Gun Violence Data Hub, a project of The Trace. The Trace is a nonprofit newsroom that exclusively covers gun violence in the U.S. He formerly worked at the Los Angeles Times, NPR and CQ Roll Call.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/georgelevines/"}],"expertise":""},"Beryl Lipton":{"affiliation":"Democrat & Chronicle","bio":"","headshot":"","social":[],"expertise":""},"Ryan Little":{"affiliation":"ProPublica","bio":"Ryan Little is a deputy data editor at ProPublica, where he helps lead a team of data reporters on investigative and accountability projects. Prior to joining ProPublica, he was the data editor at The Baltimore Banner. Stories he has worked on have won multiple national awards, including the 2025 Philip Meyer. He is a frequent speaker on data journalism and a dedicated mentor to emerging data reporters.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/litte-ryan.png","social":[{"label":"X","url":"https://x.com/ryanlittlee"},{"label":"Bluesky","url":"https://bsky.app/profile/ryanlittle.bsky.social"}],"expertise":"data journalism; investigative reporting; computational journalism; data analysis; web scraping; data-driven storytelling"},"Phoebe Liu":{"affiliation":"Forbes","bio":"","headshot":"","social":[],"expertise":""},"Liz Lucas":{"affiliation":"University of Missouri","bio":"Liz Lucas is the Houston Harte Chair in Journalism at Mizzou, where she teaches courses in data journalism and emerging technologies. She previously worked as a data reporter and editor for various newsrooms and as a trainer for Investigative Reporters and Editors (IRE).","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/lucas-liz.jpg","social":[{"label":"GitHub","url":"https://github.com/eklucas"}],"expertise":"Data journalism; Investigative reporting; Data analysis; Journalism training; AI in journalism; Health, politics, and environment reporting"},"Clayton Ludwig":{"affiliation":"University of Maryland","bio":"Clay Ludwig is a journalism student at the University of Maryland who develops AI-powered tools for reporters. When he isn't talking to his favorite LLMs, he covers science and technology for The Diamondback, the university's independent student newspaper, and builds apps on the side. NICAR 2026 will be his first time at the conference as both an attendee and a speaker.","headshot":"","social":[{"label":"Website","url":"https://clayludwig.com"},{"label":"GitHub","url":"https://github.com/clay-ludwig"},{"label":"X","url":"https://twitter.com/clayludwig"}],"expertise":""},"Craig Lyons":{"affiliation":"Arnolt Center for Investigative Journalism","bio":"Craig Lyons joined the Arnolt Center in November 2021 as its first managing editor. Lyons has spent nearly 20 years covering government agencies at the local, state and federal level in Michigan, Indiana, New Hampshire, Vermont and Maine. Lyons\u2019 work has earned recognition from the Chicago Headline Club, Michigan Press Association, Hoosier State Press Association and the Indiana Chapter of the Society of Professional Journalists.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/lyons-craig.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/craiglyons.bsky.social"},{"label":"X","url":"https://x.com/craigalyons"},{"label":"LinkedIn","url":"https://linkedin.com/in/craig-lyons-a2766b17"}],"expertise":""},"Tory Lysik":{"affiliation":"Tow Center at Columbia University","bio":"Tory Lysik is a media research fellow and journalist fellow at the Tow Center for Digital Journalism at Columbia University, reporting on AI, misinformation, higher education and politics. Based in New York City, she was previously a data and graphics journalist at Axios, reporting interactive data visualizations for national audiences, and a reporter at Vox and Poynter Institute in Washington, D.C. Her work has appeared in The Marshall Project, Slate and others.","headshot":"","social":[{"label":"X","url":"https://x.com/tblysik"},{"label":"Signal","url":"https://signal.me/#p/TBlysik.85"},{"label":"Bluesky","url":"https://bsky.app/profile/toryl.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/tory-lysik/"}],"expertise":""},"Michelle Ma":{"affiliation":"Bloomberg","bio":"Michelle Ma is a reporter for Bloomberg News in Los Angeles. She covers clean energy and climate technologies. She also writes about the climate impacts of the AI data center boom and the intersection of climate change, electric utilities and insurance in the western US. Previously, she was a climate reporter at Protocol. Before that, she was a news editor of live journalism and special coverage at The Wall Street Journal.","headshot":"","social":[{"label":"X","url":"https://x.com/HiMichelleMa"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/michelle-ma-8b258436/"},{"label":"Bluesky","url":"https://bsky.app/profile/michellema.bsky.social"},{"label":"Stories","url":"https://www.bloomberg.com/authors/AWTYlfwjEUk/michelle-ma"}],"expertise":""},"Tyler Machado":{"affiliation":"Independent journalist","bio":"Tyler Machado is a freelance web developer and design technologist, located in Boston, MA. Tyler has created data-driven visual stories and dashboards for publications like the Pudding, Science News, Harvard Business Review and Northeastern University. He has also worked on design systems, UX/UI and frontend development for independent media websites across in-house and agency roles, and recently designed the branding for Boston\u2019s new NWSL soccer supporters\u2019 group.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/tylermachado/"},{"label":"GitHub","url":"https://github.com/tylermachado"},{"label":"Bluesky","url":"https://bsky.app/profile/tylermachado.com"}],"expertise":"Data visualization; Front-end development; UI/UX design; Interactive narratives; WordPress development"},"Prinz Magtulis":{"affiliation":"Reuters","bio":"Prinz has been a graphics reporter for Reuters since 2022, designing charts and other visuals to better tell stories behind financial and economic data. Prior to this, he was based in the Philippines, where he worked as an economic beat journalist for over a decade covering macroeconomy, public finance and the financial markets for various local and international outlets. His favorite chart -- and breakfast-- is a waffle.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/magtulis-prinz.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/prinzmagtulis/"},{"label":"GitHub","url":"https://github.com/pmagtulis"}],"expertise":"financial journalism; data analysis and visualization; macroeconomy and public finance reporting; policy research"},"Robert Maguire":{"affiliation":"Citizens for Responsibility and Ethics in Washington","bio":"Robert is the vice president for research and data at Citizens for Responsibility and Ethics in Washington (CREW), where he leads efforts to investigate dark money and corruption. Prior to joining CREW, he founded the dark money tracking program at OpenSecrets, where he won SPJ\u2019s Sigma Delta Chi award for his reporting. He has collaborated with and appeared in major outlets nationwide like NPR, The Washington Post, the New York Times and CNN.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/maguire-robert.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/robertmaguire.bsky.social"}],"expertise":""},"Olivia Mapes":{"affiliation":"The Purdue Exponent","bio":"Olivia Mapes is the editor-in-chief of The Exponent, Purdue's independent newspaper. Mapes is a senior studying creative writing and literature and planning on becoming a full-time journalist. During her time at The Exponent she has broken the news on the restructuring of the honors college, which the university has still not publicly announced, and did a deep dive on the effects of an insurance change on university faculty.","headshot":"","social":[],"expertise":""},"Ashton Marra":{"affiliation":"West Virginia University","bio":"Ashton Marra is an influential figure in journalism education and media, serving as the Executive Editor of 100 Days in Appalachia, Co-founder and Co-director of Reporting on Addiction, and a Teaching Associate Professor at West Virginia University's Reed College of Media. She has a decade of professional experience in public and commercial media newsrooms.","headshot":"","social":[],"expertise":"Journalism education; Media leadership; Reporting on addiction; Investigative reporting; Community-focused journalism; News writing; Video storytelling; Public media reporting"},"Arlene Martinez":{"affiliation":"Good Jobs First","bio":"Arlene Mart\u00ednez is with Good Jobs First, which promotes corporate and government accountability in economic development. GJF provides extensive research and technical assistance to policymakers, journalists and others studying the effectiveness of taxpayer subsidies for \u201ceconomic development\u201d as well as corporate behavior. Arlene previously reported at outlets including Hispanic Link News Service, the Los Angeles Times, The (Allentown) Morning Call and the USA TODAY Network.","headshot":"","social":[{"label":"X","url":"https://x.com/GoodJobsFirst"},{"label":"LinkedIn","url":"https://www.linkedin.com/company/good-jobs-first/"},{"label":"Bluesky","url":"https://bsky.app/profile/goodjobsfirst.org"},{"label":"Facebook","url":"https://www.facebook.com/GoodJobsFirst"}],"expertise":"corporate accountability; government subsidies; data analysis in journalism"},"Adam Marton":{"affiliation":"University of Maryland","bio":"Adam Marton is a data journalist, senior lecturer at The Philip Merrill College of Journalism at The University of Maryland and director of the Capital News Service Data & Graphics bureau. He previously worked at The Baltimore Sun as the senior editor of data and graphics. His work on police accountability has twice been named as a Pulitzer Prize finalist: in 2024 for Lethal Restraint and in 2015 for the 45 Minute Mystery of Freddie Gray\u2019s Death.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/adammm.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/adam-marton-62113512/"}],"expertise":"data journalism; data visualization; design; front-end development; visual storytelling; information graphics"},"Anna Massoglia":{"affiliation":"MuckRock","bio":"Anna Massoglia is an investigative journalist and political finance expert with over a decade of experience, currently serving as Director of Investigations at the Sunlight Research Center and founder of Influence Brief. She previously managed editorial and investigations at OpenSecrets, specializing in uncovering hidden political spending.","headshot":"","social":[],"expertise":"dark money; political ads and propaganda; foreign influence and lobbying; political nonprofits; campaign finance and accountability journalism"},"Ty McClung":{"affiliation":"West Virginia University","bio":"Ty McClung is a second-year graduate student from Madison, West Virginia, who is pursuing a Master\u2019s in Journalism at West Virginia University. He graduated from WVU in May of 2024 with his Bachelor of Science in Journalism with a focus in broadcast television production. Ty is currently serving as the television journalism program graduate assistant. Ty has experience reporting and anchoring in various capacities.","headshot":"","social":[],"expertise":""},"Christian McDonald":{"affiliation":"University of Texas at Austin","bio":"","headshot":"","social":[],"expertise":""},"Sean McMinn":{"affiliation":"POLITICO","bio":"Sean McMinn is editor of data and graphics at POLITICO. His team covers federal policy and politics through data reporting and visualizations. He previously worked at NPR news apps and investigations teams and CQ Roll Call, and has taught classes at American University and Northwestern Medill School of Journalism.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/seanmcminn/"}],"expertise":"data journalism; data visualization; investigative reporting; politics and government data; census data"},"Dhrumil Mehta":{"affiliation":"Tow Center at Columbia University","bio":"Dhrumil Mehta is a professor of data journalism at Columbia Journalism School and deputy director of the Tow Center for Digital Journalism. He also teaches at the Harvard Kennedy School and previously worked as a database journalist at FiveThirtyEight.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/dmil"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/dhrumilmehta/"},{"label":"Bluesky","url":"https://bsky.app/profile/dmil.bsky.social"},{"label":"X","url":"https://x.com/DataDhrumil"}],"expertise":"data infrastructure; interactive tools; data-driven reporting (public opinion, elections, media); teaching data journalism; programming and data analysis"},"Elena Mejia":{"affiliation":"Bloomberg","bio":"Elena is a senior data visualization reporter and project lead for U.S. elections at Bloomberg News. She leads a team to execute the design and development of U.S. election results projects, collaborates with other reporters to analyze datasets related to election voting patterns and immigration, and creates visualizations for data-driven stories.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/elenamlutz/"}],"expertise":"data visualization design; front-end development for journalism; data analysis for politics and elections; investigative data journalism"},"Aaron Mendelson":{"affiliation":"The Trace","bio":"Aaron Mendelson is a data journalist at The Trace, a nonprofit newsroom that covers gun violence. He works on The Trace\u2019s Gun Violence Data Hub initiative. Previously, Mendelson was an investigative and data reporter at the Center for Public Integrity and NPR affiliate KPCC/LAist. His reporting has garnered honors including a Gerald Loeb Award, Online Journalism Awards and an IRE Award.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/amendelson.bsky.social"}],"expertise":"data journalism; investigative reporting; gun violence data; interactive visualizations; data collection"},"Jeremy Merrill":{"affiliation":"The Washington Post","bio":"Jeremy Merrill is a data reporter writing primarily about technology at The Washington Post. He lives in Atlanta.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/merrill-jeremy.jpg","social":[],"expertise":"Investigative data journalism; Data science and software engineering for reporting; Machine learning in journalism; Ad-tech and algorithmic exploitation; Impact of technology, internet, and AI on society; Natural language processing"},"Will Merrow":{"affiliation":"Council on Foreign Relations","bio":"","headshot":"","social":[],"expertise":""},"Chris Miles":{"affiliation":"Everlaw","bio":"Chris works at the intersection of technology and journalism, and he is an expert at helping bridge the gap between cutting-edge tech and the reporters who rely on it. At Meta, CrowdTangle and Everlaw, he has built and scaled products used by newsrooms worldwide, led complex partnerships and advised journalists and researchers navigating the rapidly evolving information space.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/miles-chris.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/cbmilez/"}],"expertise":""},"Andrew Miller":{"affiliation":"Indiana Daily Student","bio":"Andrew Miller has served as co-editor-in-chief for the Indiana Daily Student since August 2025. There, he\u2019s previously held the positions of science and environmental reporter, elections reporter, news editor and managing editor. In summer 2024, he interned at The Oregonian in Portland, Oregon, reporting on business and the timber industry. In summer last year, he reported general assignment at The Herald-Times.","headshot":"","social":[],"expertise":""},"Charles Minshew":{"affiliation":"Atlanta Journal-Constitution","bio":"Charles Minshew is the senior editor of data journalism for The Atlanta Journal-Constitution, where he leads a team of reporters using data, open records and code to tell stories about Atlanta, Georgia and the South. He also serves on the board of the Georgia First Amendment Foundation.","headshot":"","social":[{"label":"X","url":"https://twitter.com/charlesminshew"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/charlesminshew"},{"label":"Bluesky","url":"https://bsky.app/profile/charlesminshew.bsky.social"}],"expertise":"Data journalism; Investigative reporting; Training journalists; Public records; Data analysis"},"Tanvi Misra":{"affiliat rnalists and other professionals on how to use data-driven and investigative reporting storytelling techniques and computational journalism methods to produce deeply reported government accountability stories. Last year, she and her students shared in the top prize for IRE's student investigative journalism and serves on IRE\u2019s Academic Task Force.","headshot":"","social":[{"label":"X","url":"https://x.com/maggiemulvihill"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/maggiemulvihill"}],"expertise":"Data journalism education; Investigative reporting; Computational journalism; First Amendment and media law; Data-driven storytelling"},"Sana Muneer":{"affiliation":"Boston University","bio":"Sana Muneer is a junior at Boston University studying journalism and psychology. Most recently, she served as the general assignment nightside news co-op at Boston.com. She is currently vice president of BU\u2019s independent student newspaper, The Daily Free Press, and also held roles as managing co-editor and features editor. Her work can be found in The Dorchester Reporter, The Marblehead Current, BU Today, Student Press Law Center and The Stroll Glen Ellyn.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/muneer-sana.png","social":[{"label":"X","url":"https://x.com/SanaSMuneer"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/sana-muneer-571b1721a"}],"expertise":""},"Cat Murphy":{"affiliation":"University of Maryland","bio":"Cat is a second-year master's student and Howard Center for Investigative Journalism fellow at the University of Maryland's Philip Merrill College of Journalism. She graduated from Quinnipiac University with a bachelor's degree in journalism in 2024. Cat's main interests are in data-driven reporting and public records, and she recently collaborated with the Associated Press and NPR as part of a Howard Center investigation into rail safety.","headshot":"","social":[{"label":"X","url":"https://x.com/IAMCATMURPHY ccuracy vs. efficiency, independence vs. algorithmic support, and so on. In response, she builds AI systems to surface these trade-offs and help journalists navigate them, in support of public-interest journalism.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/sachnishal.bsky.social"}],"expertise":"Human-computer interaction; Computational journalism; AI-infused systems for journalism; Science communication; Value-sensitive design"},"Mariia Novoselia":{"affiliation":"University of Missouri","bio":"","headshot":"","social":[],"expertise":""},"Mariia  Novoselia":{"affiliation":"University of Missouri","bio":"","headshot":"","social":[],"expertise":""},"Gavin Off":{"affiliation":"University of Florida","bio":"Gavin Off is a data journalism lecturer at the University of Florida. Prior to joining UF, he spent 15 years as an investigative data reporter at the Charlotte Observer, where his reporting and data analysis helped win several national awards, including an IRE award.","headshot":"","social":[],"expertise":""},"Soo Oh":{"affiliation":"CalMatters / The Markup","bio":"Soo Oh is deputy managing editor of impact at CalMatters and The Markup, where she leads the data and product teams. She has previously edited investigations, reported stories and built data-driven journalism, from scraping and analyzing datasets to coding interactive graphics and developing internal tools.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/soooh/"}],"expertise":""},"Caitlin Ostroff":{"affiliation":"The Wall Street Journal","bio":"Caitlin Ostroff is a data reporter for The Wall Street Journal in New York, where she covers crypto, finance and politics. She was previously based in London, covering crypto and European finance for The Journal. She's landed scoops and chronicled turmoil at crypto exchanges FTX and Binance.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/ostroff-caitlin.png","social":[{"lab
