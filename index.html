ip Merrill College of Journalism. She currently reports for Capital News Service, a newswire run by the University of Maryland, and is based in Washington, D.C. She holds a bachelor\u2019s degree from Pomona College.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/haley-parsley"}],"expertise":""},"Veronica Penney":{"affiliation":"American Association for the Advancement of Science","bio":"Veronica Penney is a graphics editor and data reporter at Science magazine, where she reports, analyzes data and designs graphics for the newsroom. She specializes in data reporting, with an emphasis on climate change and cartography, and is an instructor for Columbia Journalism School\u2019s Lede Program. Previously, she worked as an investigative data reporter for Colorado Public Radio and as a climate and graphics reporter for The New York Times and The Washington Post.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/penney-veronica.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/veronicapenney.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/veronicapenney/"}],"expertise":"data analysis; graphics and cartography; climate change reporting; investigative reporting"},"Erica Peterson":{"affiliation":"Mountain State Spotlight","bio":"","headshot":"","social":[],"expertise":""},"Scott Pham":{"affiliation":"CBS News","bio":"Scott Pham is a data reporter at CBS News, where he works on original investigations and collaborates across the network. He also serves as the managing editor for the data team.","headshot":"","social":[],"expertise":""},"Cheryl Phillips":{"affiliation":"Big Local News","bio":"Cheryl Phillips is a lecturer at Stanford and founder of Big Local News, which supports newsrooms by sharing public data for accountability reporting. Last year, Big Local News contributed to a Pulitzer Prize for Local Reporting with The Baltimore Banner, The New York Times and nine other newsrooms. She spent 12 years at The Seattle Times, where she was a part of two Pulitzers for breaking news and two Pulitzer finalists. She is a former IRE board president.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/phillips-cheryl.png","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/cheryl-phillips-biglocalnews/"}],"expertise":""},"Lisa Pickoff-White":{"affiliation":"California Reporting Project","bio":"Lisa Pickoff-White is the California Reporting Project\u2019s director of research, based at Berkeley Journalism's Investigative Reporting Program. She turns police violence and misconduct records into data and impactful reporting with journalists and engineers. At KQED, she worked on award-winning investigations examining fire risk, emergency response breakdowns and jail conditions. She\u2019s also built applications to meet audience needs, from fire maps to election results.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/pickoffwhite-lisa.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/pickoffwhite.bsky.social"}],"expertise":"data journalism; investigative reporting; public records analysis; data visualization; police accountability data; building data applications"},"Garry Pierre-Pierre":{"affiliation":"URL Media","bio":"","headshot":"","social":[],"expertise":""},"Ryan Pitts":{"affiliation":"Big Local News","bio":"","headshot":"","social":[],"expertise":""},"Justin Price":{"affiliation":"Atlanta Journal-Constitution","bio":"Justin Price uses data and public records to tell stories for the Atlanta Journal-Constitution.","headshot":"","social":[],"expertise":""},"Tara Puckey":{"affiliation":"Radio Television Digital News Association","bio":"Tara Puckey is the president and CEO of the Radio Television Digital News Association (RTDNA). She has held senior leadership roles at both RTDNA and the Society of Professional Journalists, and she has trained more than 3,000 journalists and professionals in effective leadership. Recognized as one of Association Forum\u2019s \"Forty Under 40\" and an Obama Leader for 25\u201326, she is a Certified Association Executive and Fellow of the American Society of Association Executives.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/puckey-tara.png","social":[{"label":"LinkedIn","url":"LinkedIn: https://www.linkedin.com/in/tarapuckey/"},{"label":"X","url":"https://x.com/tpuckey"},{"label":"Bluesky","url":"https://bsky.app/profile/tpuckey.bsky.social"}],"expertise":""},"Cierra Putman":{"affiliation":"WTHR","bio":"Cierra Putman is a nationally recognized investigative reporter for 13 Investigates, specializing in exposing injustice and holding power accountable. She utilizes public records and creates independent datasets to fight for the public's right to know.","headshot":"","social":[],"expertise":"Investigative reporting; Public records; Creating independent datasets; Accountability journalism"},"Amy Qin":{"affiliation":"WBEZ","bio":"Amy Qin is a data reporter for WBEZ, where she uses a combination of data analysis, computer programming and traditional reporting methods to tell data-driven stories for broadcast and print. ","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/amyqin.bsky.social"}],"expertise":""},"Phoebe Quinton":{"affiliation":"Atlanta Journal-Constitution","bio":"Phoebe Quinton is a data journalist at the Atlanta Journal-Constitution, where she works on the politics and investigative teams. Previously, she worked on a special report at Reuters to investigate how a federal agency became an unlikely ally for companies and others responsible for cleanups at toxic sites.","headshot":"","social":[{"label":"LinkedIn","url":"https://linkedin.com/in/phoebe-quinton-578377161"}],"expertise":"Data journalism; Investigative reporting; Telling underreported stories; Immigrant communities; State salary data analysis"},"Kaitlyn Radde":{"affiliation":"Pew Research Center","bio":"Kaitlyn Radde is a computational social scientist at Pew Research Center. She previously worked as a data visualization designer at the Center and completed news reporting and graphics internships at NPR and Chalkbeat.","headshot":"","social":[{"label":"LinkedIn","url":"www.linkedin.com/in/kaitlyn-radde"},{"label":"Website","url":"https://kaitlynradde.github.io"}],"expertise":"information graphics design; data visualization; data reporting; R graphics package development"},"Elliott Ramos":{"affiliation":"CBS News","bio":"","headshot":"","social":[],"expertise":""},"Fahmida Rashid":{"affiliation":"Dark Reading","bio":"","headshot":"","social":[],"expertise":""},"Disha Raychaudhuri":{"affiliation":"Reuters","bio":"Disha Raychaudhuri is a data journalist at Reuters covering global inequality, race and social justice. She is also an active member of the Reuters Peer Network, offering peer\u2011to\u2011peer mental health support to colleagues. Before joining Reuters in 2020, she was a data reporter at The Star\u2011Ledger, covering demographics, inequality and policing. She moved to the U.S. in 2016 after reporting stints in India and Bangladesh focused on education and oral\u2011history projects.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/disha-rc/"}],"expertise":"Data journalism; Investigative reporting; Data analysis and interpretation; Large dataset verification"},"Hannah Reale":{"affiliation":"GBH News","bio":"Hannah Reale covers children and families in Massachusetts. She\u2019s sampled journalism that touches just one New York neighborhood to every corner of the globe, reporting for NPR, The World, The Wire China, The West Side Rag and The Wesleyan Argus. As an editor, she works with journalists across the newsroom to improve web stories for structure, style and accuracy. She\u2019s a determined newshound, shutterbug and eagle-eyed editor who ferrets out hard-to-wrangle datasets.","headshot":"","social":[{"label":"X","url":"https://x.com/hannahereale"},{"label":"Bluesky","url":"https://bsky.app/profile/hannahereale.bsky.social"}],"expertise":""},"Pratheek Rebala":{"affiliation":"ProPublica","bio":"","headshot":"","social":[],"expertise":""},"Hannah Recht":{"affiliation":"Associated Press","bio":"","headshot":"","social":[],"expertise":""},"Alex Reed":{"affiliation":"Mapping Black California","bio":"Alex Reed is project manager for Mapping Black California and a proud Carengie Mellon University Tartan. A Jane of all trades, she works at the intersection of data and storytelling to make complex information accessible and engaging. Through dynamic visualizations, her work addresses social disparities in education, economic opportunity, public health and environmental rights.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/alexesreed/"}],"expertise":""},"Rob Reid":{"affiliation":"Texas Tribune","bio":"Rob Reid is the Texas Tribune's education data developer, building a K-12 education data warehouse and web tools while supporting reporters with data analysis. He joined in 2024 after a data journalism internship at the Jacksonville Tributary, Columbia University's Lede Program and data consulting for Northwestern's Medill School. In a prior career, he developed a case management database with Healthy Families America.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/reid-rob.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/rob-reid-789a6a1/"},{"label":"Bluesky","url":"https://bsky.app/profile/robcat26.bsky.social"}],"expertise":""},"Mike Reilley":{"affiliation":"UIC | JournalistsToolbox.ai","bio":"Mike Reilley is a senior lecturer at UIC in Chicago. He teaches digital, data and AI journalism classes and runs the student lab site RedLineProject.news. He is the founder of JournalistsToolbox.ai and is the author of two books: \"Data + Journalism: A Story-Driven Approach to Learning Data Reporting\" and \"The Journalist's Toolbox: A Guide to Digital Reporting and AI\".","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/reilley-mike.jpg","social":[{"label":"X","url":"https://x.com/itsmikereilley"},{"label":"Bluesky","url":"https://bsky.app/profile/mikereilley.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/mikereilley/\n"}],"expertise":""},"Elizabeth Renter":{"affiliation":"NerdWallet","bio":"Elizabeth Renter leads the Data Studies team at NerdWallet, directing the production of original data journalism and proprietary consumer sentiment surveys. Sitting between the editorial and communications teams, Elizabeth also serves as a primary media spokesperson, translating complex macroeconomic trends into insights for the general public. Her nontraditional path highlights the evolution from data journalist to strategic leadership.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/elizabethrenter/"}],"expertise":""},"Adriana Rezal":{"affiliation":"Houston Chronicle","bio":"","headshot":"","social":[],"expertise":""},"Adam Rhodes":{"affiliation":"IRE & NICAR","bio":"","headshot":"","social":[],"expertise":""},"Steven Rich":{"affiliation":"The New York Times","bio":"Steven Rich is a data reporter at The New York Times, after having spent more than a decade at The Washington Post. He\u2019s worked on investigations probing policing, immigration, opioids and subjects spanning nearly every beat. He has been a reporter on two teams awarded Pulitzer Prizes, in 2014 and 2016, and on two teams awarded a Peabodys, in 2018 and 2021. He previously served three terms on IRE\u2019s board of directors.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/datab.ae"}],"expertise":""},"Gerald Rich":{"affiliation":"Big Local News","bio":"","headshot":"","social":[],"expertise":""},"Alex Richards":{"affiliation":"Syracuse University","bio":"Alex Richards is a journalism professor at Syracuse University\u2019s Newhouse School. Before joining the academy, he was a reporter and editor at news organizations including the Chicago Tribune, The Chronicle of Higher Education and the Las Vegas Sun, as well as the consumer finance company NerdWallet. He's also a former IRE training director.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/alex-richards/"}],"expertise":"investigative data journalism; data-driven storytelling; data visualization; web design for journalism; data analysis with R and Google Sheets; journalism education"},"Jessica Riley":{"affiliation":"West Virginia University","bio":"Jessica Riley is a graduate student receiving both a bachelor's and a master's in journalism from West Virginia University, specializing in digital reporting. She has a strong passion for hard news/investigative work as well as data-driven stories.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/jessica-riley-1851b2214/"}],"expertise":""},"Max Rivera":{"affiliation":"Bloomberg","bio":"Max Rivera is a data journalist. He\u2019s a reporter at Bloomberg News, where he uses code to dig through large datasets and uncover stories across a wide range of beats. His reporting has ranged from immigration and automotive safety to sports.","headshot":"","social":[{"label":"X","url":"https://twitter.com/MR_Max_Rivera"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/max-rivera/"}],"expertise":""},"C.J. Robinson":{"affiliation":"Tow Center at Columbia University","bio":"C.J. Robinson is a reporting and research fellow at the Tow Center for Digital Journalism at Columbia University, where he writes data stories on AI, media and politics. He graduated in 2025 with a M.S. in Data Journalism at Columbia Journalism School, and previously worked as a product analyst on The New York Times Games team.","headshot":"","social":[{"label":"X","url":"https://x.com/_cjrobinson"},{"label":"GitHub","url":"https://github.com/cj-robinson"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/christophercjrobinson/"},{"label":"Bluesky","url":"https://bsky.app/profile/cj-robinson.bsky.social"}],"expertise":"data journalism; AI and publishers; politics; data analysis; R packages"},"David Robinson":{"affiliation":"Rochester Democrat and Chronicle","bio":"","headshot":"","social":[],"expertise":""},"Cam Rodriguez":{"affiliation":"Independent journalist","bio":"Cam Rodriguez is a data and investigative reporter based in Chicago, and she most recently was a local investigations fellow at The New York Times. She has worked with teams at MuckRock, Chalkbeat, USA TODAY, South Side Weekly, the Detroit Free Press, WTTW and the Better Government Association, and she writes as much as she codes. When she\u2019s not digging in archives or making another pot of coffee, she\u2019s usually playing with maps, watching rom-coms or exploring the Midwest with her dog.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/rodriguez-cam.jpg","social":[{"label":"X","url":"https://twitter.com/journo_cam"},{"label":"Bluesky","url":"https://bsky.app/profile/camrodriguez.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/cam-rodriguez/"},{"label":"GitHub","url":"https://github.com/cam-rodriguez"},{"label":"Newsletter","url":"https://buttondown.com/foiaday"}],"expertise":"data reporting; investigative journalism; public records; spatial analysis; data visualization; community engagement reporting"},"Simon Rogers":{"affiliation":"Google","bio":"Simon Rogers is an award-winning data journalist, writer and speaker. He is co-host of The Data Journalism Podcast and author of \"Facts are Sacred.\" He has also written a range of infographics for children books from Candlewick. Rogers is data editor at Google, advisor to the Sigma Data Journalism Awards and author of \"What We Ask Google,\" published in 2026.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/rogers-simon.jpg","social":[{"label":"X","url":"https://x.com/smfrogers"},{"label":"Instagram","url":"https://www.instagram.com/simonrogersdata"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/simonrogersjournalist"}],"expertise":""},"Maia Rosenfeld":{"affiliation":"KFF Health News","bio":"Maia Rosenfeld is a data reporter on the enterprise team at KFF Health News, specializing in using data analysis to uncover and tell stories. She previously conducted data-driven investigations for ABC News.","headshot":"","social":[],"expertise":"data journalism; data analysis; investigative reporting; health news"},"Katey Rusch":{"affiliation":"UC Berkeley","bio":"Katey Rusch is an investigative reporter at UC Berkeley\u2019s Investigative Reporting Program, focused on police accountability and public records. A Pulitzer Prize finalist, she specializes in data-driven investigations.","headshot":"","social":[],"expertise":""},"Emilia Ruzicka":{"affiliation":"Independent journalist","bio":"Emilia Ruzicka is a data journalist seeking their next full-time job. They work part-time managing data for the Trans News Initiative and were formerly a data reporter at Stacker. They have published with the Urban Institute, the Center for News, Technology, and Innovation, and other outlets. Emilia enjoys reporting on health, science, technology, queer issues and public data. They have an MA from U. of Virginia and a BS from Brown U.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/ruzicka-emilia.jpg","social":[{"label":"Website","url":"https://emiliaruzicka.com"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/emilia-ruzicka-639306182/"},{"label":"Bluesky","url":"https://bsky.app/profile/emiliaruzicka.bsky.social"},{"label":"Instagram","url":"https://www.instagram.com/emiliaruzicka/"}],"expertise":"Data analysis; Data visualization; Data reporting; Accessible content creation; Gender inclusivity in data reporting"},"Aarushi Sahejpal":{"affiliation":"American University","bio":"Aarushi Sahejpal is a data science and AI professor at American University and data editor at the Investigative Reporting Workshop.","headshot":"","social":[],"expertise":"data journalism; investigative reporting; data science; artificial intelligence; quantitative methods"},"Aaron Sankin":{"affiliation":"The Marshall Project","bio":"Aaron Sankin is the data editor at The Marshall Project, a nonprofit news organization covering the criminal justice system in America. He was previously an investigative reporter at The Markup and the Center for Investigative Reporting.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/asankin.bsky.social"}],"expertise":""},"Piotr Sapiezynski":{"affiliation":"Northeastern University","bio":"Piotr is an Assistant Research Professor at Northeastern University. His work focuses on experimental verification of online platforms and their algorithms, with the focus on discrimination, privacy violations and disregard for user agency. He has collaborated with reporters at ProPublica, The Markup, The Atlantic and The New York Times. He has served as an expert for the Department of Justice in civil rights cases, and audited platforms with NGOs including Amnesty International.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/sapiezynski.bsky.social"}],"expertise":""},"Tiasia  Saunders ":{"affiliation":"University of Maryland","bio":"Tiasia Saunders is a Howard Center for Investigative Journalism Data Journalist Fellow at the Philip Merrill College of Journalism at the University of Maryland in College Park, MD. Additionally, she is a graduate student studying data journalism and is expected to graduate in May 2026. Lastly, she will be a Data Journalist in the Data Bureau in the Spring 2026 semester for Capital News Service.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/t-cms/portfolio"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/tiasia-saunders-1494671b5/"}],"expertise":""},"Hilke Schellmann":{"affiliation":"Independent journalist","bio":"Hilke Schellmann is an Emmy award-winning investigative journalist and an Associate Professor of Journalism at New York University, as well as a research fellow at Princeton University. She is the author of \"The Algorithm: How AI Decides Who Gets Hired, Monitored, Promoted, and Fired\u2014and Why We Need to Fight Back Now.\"","headshot":"","social":[],"expertise":"Investigative reporting on artificial intelligence (AI); AI accountability and bias; AI in the workplace and hiring practices; Using AI tools for journalism and FOIA requests"},"Jon Schleuss":{"affiliation":"NewsGuild","bio":"","headshot":"","social":[],"expertise":""},"Daniel Schwalbe":{"affiliation":"DomainTools","bio":"Daniel has worked in the Information Security Space for over 25 years, and is currently Head of Investigations at DomainTools. He has a background in Cyber Threat Hunting and Incident Response, and has worked in Government and Higher Education before joining the private sector. His first \"real\" job however was as a Stringer for the regional newspaper \"Suedwest Presse\" in southern Germany, where in the 1990s he covered community interest stories of the region.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/schwalbe-daniel.jpg","social":[{"label":"LinkedIn","url":"https://linkedin.com/in/schwalbe"},{"label":"Mastadon","url":"https://infosec.exchange/@danonsecurity"}],"expertise":""},"Ivy  Scott":{"affiliation":"The Marshall Project","bio":"Ivy Scott is an engagement reporter for The Marshall Project, responsible for producing community-driven, investigative and public service journalism about the criminal justice systems in St. Louis and Missouri. She was previously a beat reporter at The Boston Globe, covering climate solutions, state courts, police accountability and the Massachusetts Department of Correction. Her work has been honored as a Livingston finalist and Webby nominee.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/scott-ivy.png","social":[],"expertise":""},"Libby Seline":{"affiliation":"University of Chicago","bio":"Libby Seline is a University of Chicago graduate student studying computational analysis and public policy. Before grad school, she was a data reporter at the San Antonio Express-News via the Texas Development Hub, and then she worked at the Flatwater Free Press as their first election guide editor. She also has bylines in The New York Times, the Salt Lake Tribune and the Lincoln Journal Star.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/seline-libby.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/libbyseline.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/libbyseline/"},{"label":"GitHub","url":"https://github.com/libbyseline"}],"expertise":"Data visualization and reporting; Data analysis for journalism; COVID-19 data collection; Election guide editing"},"Ryan Serpico":{"affiliation":"Hearst","bio":"Ryan Serpico is deputy director of newsroom AI and automation at Hearst Newspapers' DevHub, where he builds AI-powered tools that help journalists find stories and serve readers. His work includes Assembly/Meeting Monitor, winner of the 2024 Online Journalism Award, and Producer-P, used 1,000+ times monthly across Hearst properties. A University of Florida journalism graduate, he's focused on technology that amplifies reporters, not replaces them.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/serpico-ryan.jpg","social":[{"label":"GitHub","url":"https://github.com/ryan-serpico"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/ryanserpico/"}],"expertise":""},"Garrett Shanley":{"affiliation":"Miami Herald","bio":"Garrett Shanley is an award-winning correspondent for the Miami Herald and Tampa Bay Times Tallahassee Bureau, known for his investigative reporting at the intersection of immigration, education, and state politics. His work, which often involves publicly available data and record requests, has garnered national awards including the Dan Rather Medal for News and Guts and a Collier Award for Ethics in Journalism.","headshot":"","social":[],"expertise":"investigative journalism; public records; state politics; education policy; immigration"},"Sotirios Sideris":{"affiliation":"Nieman Foundation for Journalism at Harvard University","bio":"Sotiris Sideris is a 2026 Nieman Fellow at Harvard and an investigative data journalist, editor and educator working on cross-border accountability investigations at the intersection of technology, power and the public interest. His work develops and scrutinizes data-driven and AI-assisted methods to expose systemic abuses and opaque institutions. He collaborates with international newsrooms and trains journalists in data reporting, OSINT and responsible AI.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/sotiris-sideris-521039a3/"},{"label":"X","url":"https://x.com/SotSideris"}],"expertise":"data journalism; investigative reporting; cross-border collaboration; AI in journalism; digital media education"},"Max Siegelbaum":{"affiliation":"Documented","bio":"","headshot":"","social":[],"expertise":""},"Ellis Simani":{"affiliation":"ProPublica","bio":"Ellis is a data reporter at ProPublica, where his work pairs quantitative analysis with traditional investigative reporting techniques. He often covers stories at the intersection of money and power. His recent work has interrogated the ways that nonprofit organizations raise and spend their money. Simani has also investigated the stock trading of the wealthiest Americans. Before joining ProPublica in 2019, he worked on the Los Angeles Times\u2019 data visualization desk.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/emsimani.bsky.social"}],"expertise":""},"Gunita Singh":{"affiliation":"Reporters Committee for Freedom of the Press (RCFP)","bio":"","headshot":"","social":[],"expertise":""},"Casey Smith":{"affiliation":"Indiana Capital Chronicle","bio":"Casey Smith is a senior reporter at the Indiana Capital Chronicle, part of States Newsroom. She previously reported on the Indiana Legislature for The Associated Press. She holds degrees from UC Berkeley\u2019s Graduate School of Journalism and Ball State University. Smith's reporting has earned the Goldsmith Prize, George Polk Award, Selden Ring, and recognition as a Pulitzer Prize finalist, among other honors. Indiana's SPJ Chapter named her journalist of the year in 2025.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/smith-casey.jpg","social":[{"label":"X","url":"https://x.com/SmithCaseyA"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/caseyannsmith/"}],"expertise":""},"Drew Solt":{"affiliation":"West Virginia University","bio":"Drew Solt is a second-year graduate student at West Virginia University. He is set to graduate with a Master's Degree in Journalism in May. Solt graduated in May of 2024 from WVU with a bachelor's degree in Journalism. He works as a graduate student at WVU Health Sciences Marketing and Communications and freelances in live sports production for WVU Athletics.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/solt-andrew.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/andrewsolt/"}],"expertise":""},"Jonathan Soma":{"affiliation":"Columbia University","bio":"Jonathan Soma is the Knight Chair in Data Journalism at Columbia University, where he directs the Data Journalism MS and the Lede Program. He is a programmer and educator specializing in making complex data concepts accessible for journalists, having worked with organizations like ProPublica and The New York Times.","headshot":"","social":[],"expertise":"data analysis with Python; interactive visualization; machine learning; AI in journalism; web scraping; data cleaning"},"Paroma Soni":{"affiliation":"POLITICO","bio":"Paroma Soni is a data and graphics reporter at POLITICO covering trade, agriculture, politics and immigration. She produces data-driven visual analyses for POLITICO Pro on topics such as the Trump administration\u2019s tariffs, federal funding, visa policy and shifts in domestic manufacturing. Previously, she was an associate visual journalist at FiveThirtyEight covering elections and politics, and a Delacorte Fellow at Columbia Journalism Review. She is based in New York.","headshot":"","social":[{"label":"X","url":"https://twitter.com/paromasoni"},{"label":"GitHub","url":"https://github.com/paromasoni"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/paroma-soni-6a5959135/"}],"expertise":"data journalism; graphics reporting; visual journalism; social justice reporting; human rights journalism; politics and gender reporting"},"Stephanie Stamm":{"affiliation":"The Wall Street Journal","bio":"Stephanie Stamm is an award-winning visual editor for The Wall Street Journal, specializing in data visualization, analysis and illustration. Before joining the Journal, she worked for the Washington Post and National Journal. For fun, she watercolors and plays video games.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/stamm-stephanie.jpeg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/sestamm/"}],"expertise":""},"Sam Stecklow":{"affiliation":"Invisible Institute","bio":"Sam Stecklow is an investigative journalist and FOIA fellow with Invisible Institute, a nonprofit public accountability journalism organization based in Chicago. He works on investigations into police misconduct and abuse, and on II's public data tools the Civic Police Data Project and the National Police Index. His work has been recognized with a Sunshine Award from Utah SPJ and a Driehaus Award for investigative journalism. He is currently based in Orlando.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/samstecklow.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/samstecklow/"}],"expertise":"FOIA journalism; police accountability; investigative reporting; data collection from public records; multi-state data projects; police misconduct investigations"},"Matt Stiles":{"affiliation":"CNN","bio":"Matt Stiles is a senior data and graphics editor for CNN Digital's Visual News team. In his role, he helps lead a team of visual journalists around the world and is responsible for anticipating and executing data-driven visual coverage.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/stiles"}],"expertise":""},"Stephen Stock":{"affiliation":"WBRZ News 2","bio":"Stephen Stock is Assistant News Director and Investigative Journalist at WBRZ Baton Rouge. He specializes in public corruption, safety and transportation. Stock was a founding member of CBS News and Stations Innovation Lab and helped build investigative teams in San Francisco, Miami and Orlando. He teaches at IRE, newsrooms and universities around the US. He\u2019s won a Peabody, a du-Pont, a national SPJ, 3 Murrows, 6 AP awards and 18 Emmys.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/stock-stephen.jpg","social":[{"label":"Website","url":"https://www.stephenstock.tv/"},{"label":"Facebook","url":"https://www.facebook.com/StephenStockTV/"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/stephen-m-stock/"},{"label":"Instagram","url":"https://www.instagram.com/stephenstocktv/"},{"label":"\nX","url":"https://x.com/StephenStockTV"},{"label":"Threads","url":"https://www.threads.com/@stephenstocktv"}],"expertise":""},"Stephanie Sugars":{"affiliation":"U.S. Press Freedom Tracker","bio":"Stephanie is the managing reporter for the U.S. Press Freedom Tracker, where she oversees the newsroom and contributes to its coverage of press freedom violations across the United States. A graduate of New York University\u2019s Global and Joint Program Studies program in journalism and international relations, her professional work focuses on human rights, politics and identity-targeted violence.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/sugars-stephanie.jpeg","social":[{"label":"X","url":"https://twitter.com/stephanie_alena"},{"label":"Instagram","url":"https://www.instagram.com/stephanie.alena"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/stephaniesugars/"},{"label":"Bluesky","url":"https://bsky.app/profile/stephaniesugars.bsky.social"}],"expertise":""},"Samantha Sunne":{"affiliation":"Independent journalist","bio":"Samantha Sunne is the co-author of the textbook \u201cData + Journalism: A Story-Driven Approach to Learning Data Reporting,\u201d now being published in its second edition. She is a freelance journalist based in New Orleans, specializing in data and investigative techniques. Sunne teaches at conferences, universities and newsrooms around the world.","headshot":"","social":[],"expertise":"Data journalism training; Investigative reporting; Data scraping (without coding); Digital tools for journalists; Journalism ethics and transparency in data reporting"},"Andrea Suozzo":{"affiliation":"ProPublica","bio":"Andrea Suozzo is a news apps developer at ProPublica, where she runs Nonprofit Explorer and does data reporting on nonprofits, maternal health and other topics.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/andreasuozzo.com"}],"expertise":"News applications development; Data journalism; Database building and management; Data visualization; Investigative reporting with data; Scraping and data analysis"},"Sarah Taddeo":{"affiliation":"USA TODAY Network","bio":"","headshot":"","social":[],"expertise":""},"Aadit Tambe":{"affiliation":"The Washington Post","bio":"Aadit Tambe is a news designer at The Washington Post, where he builds interactive stories to explain the news visually.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/tambe-aadit.jpg","social":[{"label":"X","url":"https://twitter.com/aadittambe"},{"label":"GitHub","url":"https://github.com/aadittambe"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/aadittambe/"}],"expertise":"data journalism; visual storytelling with code; interactive graphics; news design; web applications"},"Kai Teoh":{"affiliation":"The Dallas Morning News","bio":"","headshot":"","social":[],"expertise":""},"Carson TerBush":{"affiliation":"The Washington Post","bio":"Carson TerBush is a visual journalist and graphics reporter based in Washington, D.C. She most recently worked as a designer and developer at The Washington Post, specializing in data-driven interactives.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/terbush-carson.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/cterbush/"}],"expertise":"graphics reporting; design; education reporting"},"Mago Torres":{"affiliation":"Google News Initiative","bio":"Mago Torres is an investigative data journalist and editor with experience working at the intersection of research and data. She has worked on award-winning long-form investigations and developed programs that support collaborations, data-driven stories and investigative journalism in the U.S. and internationally. She is currently a trainer for North America for the Google News Initiative.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/torres-mago.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/magotorres/"}],"expertise":""},"Diara Townes":{"affiliation":"NC Local","bio":"Diara J. Townes is an award-winning environmental engagement journalist from New York. She's covered stories shaped by state and national trends through freelance reporting and her newsletter, The Curious Scout. She\u2019s NC Local's program manager, supporting their expanding programmatic work for North Carolina journalists. Diara has worked for Aspen Digital and Sunlight Research Center and has served as an adjunct at the Newmark Graduate School of Journalism at CUNY.","headshot":"","social":[{"label":"Newsletter","url":"https://thecuriousscout.beehiiv.com/"},{"label":"Bluesky","url":"https://bsky.app/profile/curiousscout.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/diara-j-townes/"}],"expertise":"engagement journalism; disinformation research; environmental science communication; community engagement; investigative research techniques; data and analytics"},"Daniel Trielli":{"affiliation":"University of Maryland","bio":"Daniel Trielli is an assistant professor of media and democracy at the University of Maryland's Philip Merrill College of Journalism. He researches the impact of algorithmic systems on the distribution and production of journalism. He is interested in data and computational journalism, media literacy and algorithmic accountability. He occasionally writes about it in public-facing media, both in the United States and his native Brazil.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/danieltrielli/"}],"expertise":""},"Serdar Tumgoren":{"affiliation":"Big Local News","bio":"","headshot":"","social":[],"expertise":""},"Kevin Uhrmacher":{"affiliation":"ProPublica","bio":"Kevin Uhrmacher is the deputy news applications editor at ProPublica, where he works with a team of developers to conceive and publish impactful data-driven journalism. Before joining ProPublica, he spent more than 11 years at The Washington Post as a graphics assignment editor and reporter focused on politics and elections.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/uhrmacher-kevin.png","social":[{"label":"X","url":"https://twitter.com/kevinuhrm"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/kevinuhrmacher/"}],"expertise":""},"Jodi Upton":{"affiliation":"Syracuse University","bio":"Jodi Upton is the Knight Chair at Syracuse University, teaching investigative/data journalism classes. She is a consultant for the Knight Commission and the U.S. Olympic and Paralympic Committee. Her research includes college athletics\u2019 spending and gender inequities in college sports, police misconduct in New York and mass killings. A transparency advocate, Upton and her students have filed more than 1,000 open records requests in recent years.","headshot":"","social":[],"expertise":""},"Francisco Vara-Orta":{"affiliation":"Investigative Reporters & Editors","bio":"","headshot":"","social":[],"expertise":""},"Kyle Vass":{"affiliation":"Dragline","bio":"Kyle Vass is an investigative journalist who runs a not for profit news site (Dragline) in West Virginia. His work focuses on government accountability with an emphasis on police misconduct.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/vass-kyle.jpeg","social":[],"expertise":""},"Marina Villeneuve":{"affiliation":"Hechinger Report","bio":"","headshot":"","social":[],"expertise":""},"Matt Waite":{"affiliation":"University of Nebraska","bio":"Matt Waite is a journalism professor at the University of Nebraska-Lincoln who teaches courses in AI, data analysis and visualization. From 2007-11, he was a programmer/journalist for the St. Petersburg Times, where he developed PolitiFact, winner of the 2009 Pulitzer Prize for national reporting. Before that, he was an award-winning investigative reporter and co-author of \"Paving Paradise: Florida's Vanishing Wetlands and the Failure of No Net Loss.\"","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/mattwaite.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/matthew-waite-bb820a5/"}],"expertise":""},"Tejal Wakchoure":{"affiliation":"NBC","bio":"Tejal Wakchoure investigates data stories and creates graphics for NBC. Previously, she worked for The Baltimore Banner, where her team supported a Pulitzer Prize-winning investigative series on Baltimore's overdose crisis. She also served on the judging panel for the 2024 IRE Awards. Wakchoure studied data journalism at Columbia University and media analysis at MIT, and majored in computer science at BITS Pilani, India. Wakchoure is based in New York.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/wakchoure-tejal.jpeg","social":[{"label":"LinkedIn","url":"https://linkedin.com/in/tejalw"},{"label":"Bluesky","url":"https://bsky.app/profile/tejaldehyde.bsky.social"},{"label":"Instagram","url":"https://instagram.com/tejalwk"}],"expertise":"Data and graphics reporting; Newsroom product management; Investigative journalism data pipelines; Computer vision for media analysis; NICAR presentations"},"Lucia Walinchus":{"affiliation":"NBC Owned Television Stations","bio":"Lucia Walinchus is an award-winning journalist, attorney and ice hockey player/coach. She is currently the managing data editor for NBC Owned Stations. She has been featured as a guest speaker on CNN and was a contracted freelancer for The New York Times and The Washington Post. Her work has previously been recognized as the Best Investigative Reporting in Ohio. She is a 2026 winner of the Dupont Columbia award.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/walinchus-lucia.jpg","social":[{"label":"Bluesky","url":"https://bsky.app/profile/walinchus.bsky.social"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/luciaawt/"},{"label":"GitHub","url":"https://github.com/walinchus"}],"expertise":""},"Avery Wallace Louis":{"affiliation":"Stanford University","bio":"","headshot":"","social":[],"expertise":""},"Rob Wells":{"affiliation":"University of Maryland","bio":"Rob Wells, Ph.D., is an associate professor at the Philip Merrill College of Journalism at the University of Maryland, where he teaches reporting and data journalism. Wells\u2019s research interests involve examining the history of business journalism and its problems, such as business journalism\u2019s inability to serve the general public effectively. He is the author of two books.","headshot":"","social":[{"label":"Facebook","url":"https://www.facebook.com/robswells"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/rob-wells-7929329/"}],"expertise":"data journalism; investigative reporting; business journalism; journalism history; media technology"},"Ben Welsh":{"affiliation":"Reuters","bio":"Ben Welsh is a reporter, an editor and a computer programmer.","headshot":"","social":[{"label":"GitHub","url":"https://github.com/palewire/"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/palewire/"},{"label":"Mastadon","url":"https://mastodon.palewi.re/@palewire"}],"expertise":"News applications development; Data-driven investigative reporting; Interactive data visualizations and dashboards; Automated reporting systems and data pipelines; Open-source software for journalism; Data journalism education"},"Daniel Wheaton":{"affiliation":"Nebraska Public Media","bio":"Daniel Wheaton is the senior data journalist for the Midwest Newsroom, a collaboration of NPR member stations in Iowa, Kansas, Missouri and Nebraska. He collaborates with station reporters to produce in-depth and investigative journalism and provide data journalism assistance and graphic reporting to the region.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/daniel-wheaton/"}],"expertise":""},"Brian Whitton":{"affiliation":"The Wall Street Journal","bio":"Brian Whitton is a computational journalist at The Wall Street Journal. He builds reporting tools and analyzes data for some of the Journal's most ambitious projects. If the numbers are big, he's probably involved somehow.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/whitton-brian.jpeg","social":[{"label":"GitHub","url":"https://github.com/noslouch"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/brianwhitton"},{"label":"Bluesky","url":"https://bsky.app/profile/noslouch.bsky.social"},{"label":"X","url":"https://twitter.com/noslouch"}],"expertise":"computational journalism; data scraping; database development; interface design; digital product development"},"Eunjee Wi":{"affiliation":"Arizona State University","bio":"Eunjee Wi is a South Korean journalist and a Hubert H. Humphrey Fellow under the Fulbright Program at Arizona State University. She works at The Dong-A Ilbo, one of South Korea\u2019s major national newspapers, where she served on its award-winning investigative unit, the Hero Content Team. She has worked as a project manager for interactive stories based on investigative reporting.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/eunji-wie/"}],"expertise":""},"Andrew Williams":{"affiliation":"San Francisco Chronicle","bio":"","headshot":"","social":[],"expertise":""},"Derek Willis":{"affiliation":"University of Maryland","bio":"Derek Willis teaches and does journalism, especially data journalism, at the University of Maryland. He also loves cricket.","headshot":"","social":[{"label":"Bluesky","url":"https://bsky.app/profile/dwillis.bsky.social"}],"expertise":"Data and computational journalism; News applications development; Investigative reporting; Politics and elections data; Campaign finance data; Open-source election data"},"Simon Willison":{"affiliation":"Datasette","bio":"Simon Willison is the creator of Datasette, an open-source tool for exploring and publishing data, and works full-time building open-source tools for data journalism. He is also a co-creator of the Django Web Framework and a 2020 JSK journalism fellowship graduate from Stanford, with prior experience as a data journalist at The Guardian.","headshot":"","social":[],"expertise":"Open-source data tools (Datasette); Data journalism; AI and Large Language Models (LLMs) for data work; Python web development (Django co-creator); Structured data extraction; SQLite"},"Ben\u00e9t Wilson":{"affiliation":"IRE & NICAR","bio":"","headshot":"","social":[],"expertise":""},"Cody Winchester":{"affiliation":"Investigative Reporters & Editors","bio":"Cody Winchester was a newspaper reporter, data specialist and web developer before joining IRE as a training director in 2017. He became tech lead in 2022.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/winchester-cody.jpg","social":[{"label":"GitHub","url":"https://github.com/cjwinchester"}],"expertise":""},"Hannah Woodworth":{"affiliation":"Stanford Univeristy","bio":"Hannah is a data journalist and researcher based in Stanford, California. She most recently contracted as an AI specialist at Reuters, where she previously worked on the data team. At Stanford, she is developing knowledge graphs to structure complex news archives.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/hannah-woodworthh/"}],"expertise":""},"Aallyah Wright":{"affiliation":"Capital B News","bio":"","headshot":"","social":[],"expertise":""},"Matthew Wuschke":{"affiliation":"Boston University","bio":"Matthew Wuschke is a junior at Boston University studying journalism with an focus on sports and data journalism. He covers athletics for Boston University's student organization WTBU Sports, and has experience in writing, radio, photography and graphic design. He has skills in data extraction and analysis with a interest in Artificial Intelligence and how it can be used effectively in newsrooms.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/wuschke-matthew.jpg","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/matthew-wuschke-6882b92b2/"},{"label":"Instagram","url":"https://www.instagram.com/wuschkemedia/?__d"}],"expertise":""},"Evan Wyloge":{"affiliation":"Independent journalist","bio":"Evan Wyloge is a senior reporter at the Arizona Center for Investigative Reporting, where he has focused on accountability and watchdog reporting with an emphasis on data analysis since 2008. He has been a journalist since 2003.","headshot":"","social":[],"expertise":"data analysis in investigative journalism; accountability reporting; watchdog reporting; statewide investigative reporting"},"Joe Yerardi":{"affiliation":"The Philadelphia Inquirer","bio":"Joe Yerardi is a data reporter and news developer at The Philadelphia Inquirer, with extensive experience in data journalism roles at organizations like the Center for Public Integrity, NerdWallet, and San Antonio Express-News. His award-winning reporting includes a Gerald Loeb Award and a Paul Tobenkin Memorial Award.","headshot":"","social":[],"expertise":"Data analysis; Data visualization; Computer programming; News app development; Investigative reporting; Public records analysis"},"Leon Yin":{"affiliation":"Bloomberg News","bio":"Leon Yin is an investigative data journalist at Bloomberg News. He covers technology.","headshot":"","social":[],"expertise":"Investigative data journalism; Reporting on technology and monopolies; Building bespoke datasets; Auditing algorithms; Teaching data journalism"},"Emily Zentner":{"affiliation":"The California Newsroom","bio":"Emily Zentner is the data journalist for the statewide public and nonprofit media collaborative The California Newsroom, where she works with partner newsrooms on investigative stories and trains reporters to use data skills in their reporting. Her work primarily focuses on police accountability and climate. She was previously the data reporter at CapRadio in Sacramento, where she reported on wildfire, climate change and police mishandling of sexual assault cases.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/zentner-emily.jpg","social":[{"label":"X","url":"https://twitter.com/emilymzentner"},{"label":"GitHub","url":"https://github.com/emilymzentner"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/emilymzentner/"}],"expertise":"data reporting; digital production; data-based interactives; local news"},"Kayla Zhu":{"affiliation":"Visualping","bio":"Kayla Zhu is the public relations specialist at Visualping, an AI-powered website change detection tool, where she manages the company\u2019s Journalist Program. She has previously worked in data journalism roles for various online media outlets.","headshot":"","social":[{"label":"Website","url":"https://visualping.io/journalists"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/kayla-zhu-730194149/"}],"expertise":""},"Lucy Zimmerman":{"affiliation":"Stanford University","bio":"Lucy Zimmerman is a master's student in computer science at Stanford University focused on technology for social impact. She has conducted research on the societal impacts of generative AI at Stanford HAI and contributed to projects spanning computational journalism, civic tech and human-centered machine learning. Lucy is passionate about building tools that strengthen democratic institutions and expand access to critical information.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/zimmerman-lucy.jpg","social":[{"label":"X","url":"https://twitter.com/lucyzimmo"},{"label":"GitHub","url":"https://github.com/lucyzimmo/"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/lucyzimmo/"}],"expertise":""},"Jerry Zremski":{"affiliation":"University of Maryland","bio":"Jerry Zremski is the Klingenstein Family Endowed Chair in Journalism and director of the Local News Network at the University of Maryland's Philip Merrill College of Journalism. He joined Merrill College full-time in 2022 after serving as an adjunct professor for 10 years. A former Nieman fellow at Harvard University, Zremski previously was the longtime Washington bureau chief for The Buffalo News.","headshot":"https://ire-assets.s3.us-west-1.amazonaws.com/speaker-headshots/zremski-jerry.png","social":[{"label":"X","url":"https://x.com/LNNMaryland"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/jerry-zremski/"}],"expertise":""},"Nick McMillan":{"affiliation":"ProPublica","bio":"McMillan recently joined ProPublica as a computational journalist. Previously, he was a data journalist on NPR\u2019s investigations team, where he combined reporting with data analysis, building tools that transformed raw records into evidence for accountability reporting.","headshot":"","social":[],"expertise":""},"Elizabeth Alspach":{"affiliation":"University of Maryland","bio":"Lizzy Alspach is a senior journalism and Spanish major at the University of Maryland. There, she guided data analysis in the Howard Center for Investigative Journalism\u2019s \"Off the Rails\" project, which revealed how hazardous materials on trains face minimal regulations. She\u2019s also editor in chief of The Diamondback, a university independent student newspaper.","headshot":"","social":[{"label":"X","url":"https://x.com/lalspach03"},{"label":"LinkedIn","url":"https://www.linkedin.com/in/elizabeth-alspach-"}],"expertise":""},"Daranee Balachandar":{"affiliation":"Independent journalist","bio":"Daranee Balachandar graduated from the University of Maryland with a masters in journalism, focused on investigative and data reporting. She interned with the Investigations team at The Washington Post in 2025. During her time at Maryland, she served as a reporter for Capital News Service and the Howard Center for Investigative Journalism, and as a data journalist for The Diamondback, the university\u2019s student newspaper.","headshot":"","social":[{"label":"LinkedIn","url":"https://www.linkedin.com/in/daranee-balachandar/"}],"expertise":""},"Jaden Edison":{"affiliation":"Texas Tribune","bio":"","headshot":"","social":[],"expertise":""},"Andrew Tran":{"affiliation":"","bio":"Andrew Ba Tran is an investigative data reporter for The Washington Post, where he has contributed to Pulitzer Prize-winning projects and won the Goldsmith Prize for Investigative Reporting. He also serves as an adjunct professor at American University, teaching quantitative methods and data visualization.","headshot":"","social":[],"expertise":"Data journalism; Investigative reporting; Data analysis; Data visualization; R programming for journalists"},"K. Sophie Will":{"affiliation":"","bio":"K. Sophie Will is an investigative data reporter at Bloomberg Industry Group and an award-winning journalist with a background in investigative and data journalism. She is an active member of Investigative Reporters and Editors (IRE) and has spoken at NICAR conferences.","headshot":"","social":[],"expertise":"investigative data journalism; data analysis; solutions journalism; trauma-informed interviews; reporting on public lands and tourism; congressional reporting"},"Nausheen Husain":{"affiliation":"","bio":"Nausheen Husain is an assistant professor at Syracuse University's S.I. Newhouse School of Public Communication, focusing on journalism with an emphasis on data analysis. She is also an investigative reporter covering civil liberties and Muslim communities.","headshot":"","social":[],"expertise":"data analysis; documents-focused reporting; civil liberties issues; reporting on Muslim communities; elections data infrastructure; visual projects (Datawrapper); R; Python"},"Adrian D. Garcia":{"affiliation":"","bio":"Adrian D. Garcia is a Managing Editor for Data Visualization at Financial Times and an adjunct instructor teaching Fundamentals of Data Journalism at CUNY. He has extensive experience as a data journalist and analyst for various news organizations.","headshot":"","social":[],"expertise":"data visualization; data journalism instruction; financial data analysis; business reporting"},"Andrew Pantazi":{"affiliation":"","bio":"Andrew Pantazi is a data-driven investigative journalist with a decade of experience, having served as the founding editor of The Tributary and an enterprise reporter for The Florida Times-Union. His work has led to significant outcomes like resignations, investigations, and policy changes.","headshot":"","social":[],"expertise":"Data-driven investigative journalism; Data analysis and visualization; Web and app development for journalism; Mapping and redistricting analysis; Public corruption and accountability reporting; Criminal justice investigations"},"Caitlin McGlade":{"affiliation":"","bio":"Caitlin McGlade is an award-winning investigative data reporter with about 15 years of experience, known for holding powerful institutions accountable and prompting reforms. She has worked at news organizations like the Charlotte Observer and the Arizona Republic.","headshot":"","social":[],"expertise":"Investigative data reporting; Data analysis; Public records analysis; Accountability journalism; Identifying trends and disparities"},"Max Harlow":{"affiliation":"","bio":"Max Harlow is a data reporter at Bloomberg News in London, previously working with the Financial Times and the Bureau of Investigative Journalism. He also founded Journocoders, a community for journalists to develop technical skills.","headshot":"","social":[],"expertise":"Data journalism; Investigative journalism; Data analysis and scraping; Building data tools; Teaching technical skills to journalists"}}</script>
<script>
const SPEAKER_DB = JSON.parse(document.getElementById('speakerData').textContent);
const CSV_URL = 'https://ire-nicar-conference-schedules.s3.us-east-2.amazonaws.com/nicar-2026/nicar-2026-schedule.csv';
const ROW_HEIGHT = 15;

let sessions = [];
let highlighted = new Set(JSON.parse(localStorage.getItem('nicar2026_highlights') || '[]'));
let currentDate = null;
let showOnlyHighlighted = false;

// Load highlights from URL hash (shared links)
(function() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#picks=')) {
    try {
      hash.slice(7).split(',').filter(Boolean).forEach(id => highlighted.add(id));
      localStorage.setItem('nicar2026_highlights', JSON.stringify([...highlighted]));
    } catch(e) {}
  }
})();

// --- CSV parsing ---
function parseCSV(text) {
  // Split into lines, respecting quotes (newlines inside quotes don't split)
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQ = !inQ; cur += ch; }
    else if (ch === '\r') { /* skip */ }
    else if (ch === '\n' && !inQ) { if (cur.trim()) lines.push(cur); cur = ''; }
    else { cur += ch; }
  }
  if (cur.trim()) lines.push(cur);
  const hdrs = csvSplit(lines[0]);
  return lines.slice(1).map(l => {
    const v = csvSplit(l), o = {};
    hdrs.forEach((h,i) => o[h] = (v[i]||'').trim());
    return o;
  });
}
function csvSplit(line) {
  // Split a CSV line on commas, handling quoted fields
  const r = []; let c = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { c += '"'; i++; } // escaped quote
      else { inQ = !inQ; } // toggle — don't add quote char to value
    }
    else if (ch === ',' && !inQ) { r.push(c); c = ''; }
    else { c += ch; }
  }
  r.push(c); return r;
}

// --- Helpers ---
function parseTime(s) {
  const m = s.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = +m[1]; const mn = +m[2], ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}
function fmtTime(s) { return s.replace(/\s+/g,'').replace(/(AM|PM)/i,' $1'); }
function parseSpeakers(s) {
  if (!s || !s.trim()) return [];
  return s.split(';').map(x => {
    const p = x.trim().split(',');
    return { name: (p[0]||'').trim(), org: (p.slice(1).join(',')||'').trim() };
  }).filter(x => x.name);
}
function speakerNames(s) { return parseSpeakers(s).map(x => x.name).join(', '); }
function typeClass(t) {
  if (!t) return 'type-other';
  const l = t.toLowerCase();
  return ({demo:'type-demo',panel:'type-panel','hands-on':'type-hands-on','master class':'type-master-class',
    'nicar conversation':'type-nicar-conversation',networking:'type-networking',special:'type-special',
    'one-on-one':'type-one-on-one'})[l] || 'type-other';
}
function typeLabel(t) { return t ? t.charAt(0).toUpperCase() + t.slice(1) : ''; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Toast ---
function showToast(msg) {
  const t = document.getElementById('saveToast');
  t.textContent = msg || 'Saved!';
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 1500);
}

// --- Highlights ---
function saveHighlights() {
  localStorage.setItem('nicar2026_highlights', JSON.stringify([...highlighted]));
  updateHighlightUI();
  showToast();
}
function updateHighlightUI() {
  const n = highlighted.size;
  const els = ['highlightCount','btnShowHl','btnClearHighlights','btnShare','btnExport'].map(id => document.getElementById(id));
  if (n > 0) {
    els.forEach(el => el.style.display = '');
    els[0].textContent = n + ' session' + (n>1?'s':'') + ' highlighted';
  } else {
    els.forEach(el => el.style.display = 'none');
    showOnlyHighlighted = false;
    document.getElementById('btnShowHl').classList.remove('active');
  }
  document.querySelectorAll('.session-card').forEach(c => {
    c.classList.toggle('highlighted', highlighted.has(c.dataset.sid));
  });
}
function toggleHighlight(id) {
  if (highlighted.has(id)) highlighted.delete(id); else highlighted.add(id);
  saveHighlights();
}
function clearHighlights() { highlighted.clear(); saveHighlights(); }
function toggleShowHighlighted() {
  showOnlyHighlighted = !showOnlyHighlighted;
  document.getElementById('btnShowHl').classList.toggle('active', showOnlyHighlighted);
  applyFilters();
}
function shareHighlights() {
  const url = location.origin + location.pathname + '#picks=' + [...highlighted].join(',');
  navigator.clipboard.writeText(url).then(() => showToast('Share link copied!')).catch(() => prompt('Copy this link:', url));
}
function exportHighlights() {
  const hl = sessions.filter(s => highlighted.has(s.session_id));
  const dn = {'2026-03-05':'Thursday, March 5','2026-03-06':'Friday, March 6','2026-03-07':'Saturday, March 7','2026-03-08':'Sunday, March 8'};
  let txt = 'My NICAR 2026 Picks\n' + '='.repeat(40) + '\n\n';
  const byD = {};
  hl.forEach(s => { (byD[s.date] = byD[s.date]||[]).push(s); });
  Object.keys(byD).sort().forEach(d => {
    txt += dn[d] + '\n' + '-'.repeat(30) + '\n';
    byD[d].sort((a,b) => parseTime(a.start_time)-parseTime(b.start_time)).forEach(s => {
      txt += fmtTime(s.start_time)+' - '+fmtTime(s.end_time)+' | '+s.room+'\n';
      txt += '  '+s.title+'\n';
      if (s.speakers) txt += '  Speakers: '+speakerNames(s.speakers)+'\n';
      txt += '\n';
    });
    txt += '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download = 'nicar2026-my-picks.txt'; a.click();
}

// --- Modal ---
function openModal(sessionId) {
  const s = sessions.find(x => x.session_id === sessionId);
  if (!s) return;
  const spk = parseSpeakers(s.speakers);
  const tracks = s.tracks ? s.tracks.split(',').map(t=>t.trim()).filter(Boolean) : [];
  const isHl = highlighted.has(sessionId);
  const dn = {'2026-03-05':'Thu, Mar 5','2026-03-06':'Fri, Mar 6','2026-03-07':'Sat, Mar 7','2026-03-08':'Sun, Mar 8'};

  let h = '<button class="modal-close" onclick="closeModal()">&times;</button>';
  h += '<h2>'+escHtml(s.title)+'</h2>';
  h += '<div class="meta">';
  h += '<span>'+(dn[s.date]||s.date)+'</span>';
  h += '<span>'+fmtTime(s.start_time)+' \u2013 '+fmtTime(s.end_time)+'</span>';
  h += '<span>'+escHtml(s.room)+'</span>';
  if (s.type) h += '<span><span class="type-badge '+typeClass(s.type)+'">'+typeLabel(s.type)+'</span></span>';
  if (s.skill_level) h += '<span>'+escHtml(s.skill_level)+'</span>';
  if (s.recorded==='true') h += '<span>\ud83d\udcf9 Recorded</span>';
  h += '</div>';

  h += '<button class="btn-highlight '+(isHl?'is-highlighted':'')+'" style="margin-bottom:12px" onclick="toggleHighlight(\''+sessionId+'\');openModal(\''+sessionId+'\')">';
  h += isHl ? '\u2605 Highlighted' : '\u2606 Highlight this session';
  h += '</button>';

  if (s.description) h += '<div class="description">'+escHtml(s.description)+'</div>';

  if (spk.length > 0) {
    h += '<div class="speaker-list"><strong style="display:block;margin-bottom:6px">Speakers:</strong>';
    spk.forEach(sp => {
      const db = SPEAKER_DB[sp.name] || {};
      h += '<div class="speaker-card">';
      if (db.headshot) h += '<img class="speaker-headshot" src="'+escHtml(db.headshot)+'" alt="'+escHtml(sp.name)+'" />';
      h += '<div class="speaker-info">';
      h += '<span class="speaker-name">'+escHtml(sp.name)+'</span>';
      const aff = db.affiliation || sp.org || '';
      if (aff) h += ' <span class="speaker-org">'+escHtml(aff)+'</span>';
      if (db.bio) h += '<div class="speaker-bio">'+escHtml(db.bio)+'</div>';
      if (db.expertise) h += '<div class="speaker-expertise">'+escHtml(db.expertise)+'</div>';
      if (db.social && db.social.length) {
        h += '<div class="speaker-social">';
        db.social.forEach(lk => { h += '<a href="'+escHtml(lk.url)+'" target="_blank" rel="noopener">'+escHtml(lk.label)+'</a>'; });
        h += '</div>';
      }
      h += '</div></div>';
    });
    h += '</div>';
  }

  if (tracks.length) {
    h += '<div class="tracks">';
    tracks.forEach(t => { h += '<span class="track-tag">'+escHtml(t)+'</span>'; });
    h += '</div>';
  }
  if (s.cost) h += '<p style="font-size:0.85rem;color:#dc2626;margin-bottom:8px">Cost: $'+escHtml(s.cost)+'</p>';

  document.getElementById('modal').innerHTML = h;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// --- Grid rendering ---
function renderGrid(date) {
  currentDate = date;
  const daySessions = sessions.filter(s => s.date === date);
  if (!daySessions.length) return;

  // Room order matching original site
  const roomOrder = ['102','104','201','202','203','204','205','209',
    'White River B','White River D','White River E','White River E-F',
    'White River G','White River I','Griffin Hall',
    'Follow signs near Ballroom F','Foyer','White River Foyer','Near the escalator'];
  const dayRooms = [...new Set(daySessions.map(s=>s.room))].filter(Boolean);
  const rooms = roomOrder.filter(r => dayRooms.includes(r));
  dayRooms.forEach(r => { if (!rooms.includes(r)) rooms.push(r); });

  // Time range in 15-min slots
  const allMins = daySessions.flatMap(s=>[parseTime(s.start_time),parseTime(s.end_time)]).filter(t=>t>0);
  const gridStart = Math.floor(Math.min(...allMins)/15)*15;
  const gridEnd = Math.ceil(Math.max(...allMins)/15)*15;
  const totalSlots = (gridEnd - gridStart) / 15;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Grid template — exactly like original: 60px time col + minmax for each room
  const colTpl = '60px ' + rooms.map(() => 'minmax(120px,1fr)').join(' ');
  const rowTpl = '28px ' + Array(totalSlots).fill(ROW_HEIGHT+'px').join(' ');
  grid.style.cssText = 'display:grid; grid-template-columns:'+colTpl+'; grid-template-rows:'+rowTpl+'; min-width:'+Math.max(2100,60+rooms.length*130)+'px;';

  // Corner
  const corner = document.createElement('div');
  corner.className = 'corner';
  corner.style.cssText = 'grid-column:1; grid-row:1;';
  grid.appendChild(corner);

  // Room headers
  rooms.forEach((room, i) => {
    const el = document.createElement('div');
    el.className = 'room-header';
    el.style.cssText = 'grid-column:'+(i+2)+'; grid-row:1;';
    el.title = room;
    el.textContent = room;
    grid.appendChild(el);
  });

  // Time labels & grid lines
  for (let slot = 0; slot < totalSlots; slot++) {
    const mins = gridStart + slot * 15;
    const row = slot + 2; // row 1 is header, row 2 is first slot

    if (mins % 60 === 0) {
      // Hour line
      const line = document.createElement('div');
      line.style.cssText = 'grid-column:1/-1; grid-row:'+row+'; border-top:1px solid #e5e7eb;';
      grid.appendChild(line);
      // Label
      const lbl = document.createElement('div');
      lbl.className = 'time-label';
      const hh = Math.floor(mins/60), ap = hh>=12?'PM':'AM', h12 = hh>12?hh-12:(hh===0?12:hh);
      lbl.textContent = h12+':00 '+ap;
      lbl.style.cssText = 'grid-column:1; grid-row:'+row+'/'+(row+4)+';';
      grid.appendChild(lbl);
    } else if (mins % 30 === 0) {
      const line = document.createElement('div');
      line.style.cssText = 'grid-column:1/-1; grid-row:'+row+'; border-top:1px solid #f3f4f6;';
      grid.appendChild(line);
    }
  }

  // Session cards
  const searchVal = document.getElementById('searchBox').value.toLowerCase();
  const typeVal = document.getElementById('typeFilter').value;
  const trackVal = document.getElementById('trackFilter').value;

  daySessions.forEach(s => {
    if (!s.room || !s.start_time || !s.end_time) return;
    const col = rooms.indexOf(s.room);
    if (col === -1) return;

    const startMins = parseTime(s.start_time);
    const endMins = parseTime(s.end_time);
    const startRow = Math.round((startMins - gridStart) / 15) + 2;
    const endRow = Math.round((endMins - gridStart) / 15) + 2;
    if (endRow <= startRow) return;

    const card = document.createElement('button');
    card.className = 'session-card';
    card.dataset.sid = s.session_id;
    if (highlighted.has(s.session_id)) card.classList.add('highlighted');

    // Filtering
    let hidden = false;
    if (typeVal && s.type.toLowerCase() !== typeVal.toLowerCase()) hidden = true;
    if (trackVal && !(s.tracks||'').toLowerCase().includes(trackVal.toLowerCase())) hidden = true;
    if (searchVal && !(s.title+' '+s.speakers+' '+s.description).toLowerCase().includes(searchVal)) hidden = true;
    if (showOnlyHighlighted && !highlighted.has(s.session_id)) hidden = true;
    if (hidden) card.classList.add('hidden-by-filter');

    card.style.cssText = 'grid-column:'+(col+2)+'; grid-row:'+startRow+'/'+endRow+';';
    card.title = s.title + (s.type ? ' ('+s.type+')' : '');
    card.onclick = () => openModal(s.session_id);

    const titleSpan = document.createElement('span');
    titleSpan.className = 'title';
    titleSpan.textContent = s.title;
    card.appendChild(titleSpan);

    const names = speakerNames(s.speakers);
    if (names) {
      const sp = document.createElement('span');
      sp.className = 'speakers-line';
      sp.textContent = names;
      card.appendChild(sp);
    }

    grid.appendChild(card);
  });
}

function applyFilters() { if (currentDate) renderGrid(currentDate); }

// --- Init ---
async function init() {
  const resp = await fetch(CSV_URL);
  const text = await resp.text();
  sessions = parseCSV(text);

  const dates = [...new Set(sessions.map(s=>s.date))].sort();
  const dn = {'2026-03-05':'Thu, Mar 5','2026-03-06':'Fri, Mar 6','2026-03-07':'Sat, Mar 7','2026-03-08':'Sun, Mar 8'};

  const tabs = document.getElementById('dayTabs');
  dates.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab'+(i===0?' active':'');
    btn.textContent = dn[d]||d;
    btn.onclick = () => {
      tabs.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(d);
    };
    tabs.appendChild(btn);
  });

  // Populate type filter
  const types = [...new Set(sessions.map(s=>s.type).filter(Boolean))].sort();
  const tf = document.getElementById('typeFilter');
  types.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=typeLabel(t); tf.appendChild(o); });

  // Populate track filter
  const allTracks = new Set();
  sessions.forEach(s => { if(s.tracks) s.tracks.split(',').forEach(t => { if(t.trim()) allTracks.add(t.trim()); }); });
  const trf = document.getElementById('trackFilter');
  [...allTracks].sort().forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=t; trf.appendChild(o); });

  document.getElementById('searchBox').addEventListener('input', applyFilters);
  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('trackFilter').addEventListener('change', applyFilters);

  renderGrid(dates[0]);
  updateHighlightUI();
}
init();
</script>
